<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engram &#8212; Knowledge Base</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="engram-shared.css">
<style>
/* ── Layout ──────────────────────────────────────────── */
.knowledge-header {
  background: var(--dark-bg); color: var(--dark-text);
  padding: var(--space-lg) var(--space-lg) var(--space-md);
}
.knowledge-header h1 { color: #fff; }
.knowledge-header .subtitle { color: var(--dark-text-muted); }
.knowledge-header .nav-link { color: var(--dark-text-muted); }
.knowledge-header .nav-link:hover { color: #fff; }

.knowledge-body {
  max-width: 1020px; margin: 0 auto;
  padding: var(--space-lg);
}

/* ── Domain cards override ────────────────────────────── */
.domain-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border-light);
  box-shadow: var(--shadow-card);
}

/* ── Breadcrumb ──────────────────────────────────────── */
.detail-breadcrumb {
  display: flex; align-items: center; gap: 0.35rem; flex-wrap: wrap;
  font-size: var(--text-sm); margin-bottom: var(--space-md);
}
.detail-breadcrumb a {
  color: var(--color-primary); text-decoration: none; cursor: pointer;
  font-weight: 500;
}
.detail-breadcrumb a:hover { color: var(--color-primary-hover); }
.detail-breadcrumb .sep { color: var(--color-text-faint); }
.detail-breadcrumb .current { font-weight: 600; color: var(--color-text); }

/* ── Detail grid ─────────────────────────────────────── */
.detail-grid {
  display: grid; grid-template-columns: 280px 1fr; gap: 1.5rem;
  min-height: 400px;
}
@media (max-width: 700px) { .detail-grid { grid-template-columns: 1fr; } }

/* ── Sidebar ─────────────────────────────────────────── */
.detail-sidebar {
  background: var(--color-surface);
  border: 1px solid var(--color-border-light);
  border-radius: var(--radius-card);
  overflow: hidden; box-shadow: var(--shadow-card);
}
.detail-sidebar .sidebar-header {
  padding: 0.65rem 0.9rem;
  border-bottom: 1px solid var(--color-border-light);
  font-size: var(--text-sm); font-weight: 600;
}
.detail-sidebar .sidebar-body {
  padding: 0; max-height: 500px; overflow-y: auto;
}
.detail-sidebar .sidebar-body ul {
  list-style: none; padding: 0; margin: 0;
}
.detail-sidebar .sidebar-body li {
  font-size: var(--text-sm); cursor: pointer;
  padding: 0.45rem 0.9rem;
  border-bottom: 1px solid var(--color-border-fine);
  transition: background var(--duration) var(--ease);
  display: flex; align-items: center; gap: 0.4rem;
}
.detail-sidebar .sidebar-body li:hover { background: var(--color-bg); }
.detail-sidebar .sidebar-body li.active {
  background: var(--color-active-bg);
  border-left: 3px solid var(--color-primary);
  font-weight: 600;
}
.detail-sidebar .sidebar-body li .icon { font-size: 0.85rem; flex-shrink: 0; }
.detail-sidebar .sidebar-body li .file-trust {
  margin-left: auto; flex-shrink: 0;
}

/* ── Content panel ───────────────────────────────────── */
.detail-content {
  background: var(--color-surface);
  border: 1px solid var(--color-border-light);
  border-radius: var(--radius-card);
  overflow: hidden; box-shadow: var(--shadow-card);
}
.detail-content .content-header {
  padding: 0.65rem 0.9rem;
  border-bottom: 1px solid var(--color-border-light);
  font-size: var(--text-sm); font-weight: 600;
  display: flex; align-items: center; gap: 0.5rem;
}
.detail-content .content-meta {
  padding: 0.55rem 0.9rem;
  border-bottom: 1px solid var(--color-border-fine);
  display: flex; gap: 0.75rem; flex-wrap: wrap;
  font-size: var(--text-xs); color: var(--color-text-secondary);
}
.detail-content .content-meta .meta-item {
  display: flex; align-items: center; gap: 0.25rem;
}
.detail-content .content-meta .meta-label {
  font-weight: 600; color: var(--color-text-muted);
  text-transform: uppercase; letter-spacing: 0.04em;
}
.detail-content .content-body {
  padding: 1.15rem 1.25rem;
  max-height: 560px; overflow-y: auto;
  font-size: var(--text-base); line-height: 1.75;
}

/* ── Content typography ──────────────────────────────── */
.detail-content .content-body h1,
.detail-content .content-body h2,
.detail-content .content-body h3,
.detail-content .content-body h4 {
  margin: 1.2em 0 0.4em; line-height: 1.3;
}
.detail-content .content-body h1 { font-size: 1.25rem; border-bottom: 1px solid var(--color-border-light); padding-bottom: 0.3rem; }
.detail-content .content-body h2 { font-size: 1.1rem; border-bottom: 1px solid var(--color-border-fine); padding-bottom: 0.2rem; }
.detail-content .content-body h3 { font-size: 0.98rem; }
.detail-content .content-body h4 { font-size: 0.9rem; color: var(--color-text-secondary); }
.detail-content .content-body p  { margin: 0.6em 0; }
.detail-content .content-body ul,
.detail-content .content-body ol {
  margin: 0.5em 0; padding-left: 1.6em;
}

/* Cross-reference links */
.knowledge-xref {
  color: var(--color-primary); cursor: pointer; text-decoration: none;
  border-bottom: 1px dashed var(--color-hover-border);
  transition: border-color var(--duration) var(--ease);
}
.knowledge-xref:hover { border-bottom-style: solid; border-color: var(--color-primary); }
.content-meta .knowledge-xref { font-size: var(--text-xs); }

.detail-content .content-body li { margin: 0.25em 0; }
.detail-content .content-body li > ul,
.detail-content .content-body li > ol { margin: 0.15em 0; }
.detail-content .content-body hr {
  border: none; border-top: 1px solid var(--color-border-light);
  margin: 1.25rem 0;
}
.detail-content .content-body blockquote {
  margin: 0.6em 0; padding: 0.5em 0.85em;
  border-left: 3px solid var(--color-primary);
  background: var(--color-hover-bg); color: var(--color-text-secondary);
  border-radius: 0 var(--radius-small) var(--radius-small) 0;
}
.detail-content .content-body code {
  font-family: var(--font-mono);
  font-size: 0.82em; padding: 0.15em 0.35em;
  background: var(--color-code-bg); border-radius: 3px;
}
.detail-content .content-body pre {
  margin: 0.6em 0; padding: 0.85em; overflow-x: auto;
  background: #0d1117; color: #e2e8f0;
  border-radius: var(--radius-button);
  font-family: var(--font-mono);
  font-size: 0.8rem; line-height: 1.55;
}
.detail-content .content-body pre code {
  background: none; padding: 0; color: inherit; font-size: inherit;
}
.detail-content .content-body table {
  width: 100%; border-collapse: collapse; margin: 0.6em 0;
  font-size: var(--text-sm);
}
.detail-content .content-body th,
.detail-content .content-body td {
  text-align: left; padding: 0.5rem 0.6rem;
  border-bottom: 1px solid var(--color-border-light);
}
.detail-content .content-body th {
  font-weight: 600; font-size: var(--text-xs); color: var(--color-text-muted);
  text-transform: uppercase; letter-spacing: 0.04em;
  border-bottom: 2px solid var(--color-border);
}
.detail-content .content-body tr:hover td { background: var(--color-bg); }
.detail-content .content-body strong { font-weight: 600; }
.detail-content .content-body em { font-style: italic; }
.detail-content .content-body a {
  color: var(--color-primary); text-decoration: none;
}
.detail-content .content-body a:hover { text-decoration: underline; }
.detail-content .content-placeholder {
  padding: 3rem 1rem; text-align: center; color: var(--color-text-faint);
}

/* ── Graph overlay ───────────────────────────────────── */
.graph-toggle {
  display: inline-block; margin-left: 0.75rem;
  padding: 0.3rem 0.7rem; font-size: 0.78rem; font-weight: 500;
  background: var(--color-btn-primary); color: #fff;
  border: none; border-radius: var(--radius-button); cursor: pointer;
  transition: background var(--duration, 0.15s) ease;
}
.graph-toggle:hover { background: var(--color-btn-primary-hover); }

.graph-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: var(--color-bg); display: none;
  flex-direction: column;
}
.graph-overlay.visible { display: flex; }

.graph-toolbar {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.65rem 1.25rem;
  background: var(--dark-bg); border-bottom: 1px solid var(--dark-border);
  color: var(--dark-text); font-size: var(--text-sm, 0.82rem);
}
.graph-toolbar h2 { margin: 0; font-size: 1rem; font-weight: 600; }
.graph-toolbar .spacer { flex: 1; }
.graph-toolbar button {
  padding: 0.3rem 0.65rem; font-size: 0.78rem;
  background: var(--color-surface); color: var(--color-text);
  border: 1px solid var(--color-border); border-radius: var(--radius-button);
  cursor: pointer;
}
.graph-toolbar button:hover { background: var(--color-hover-bg); }

.graph-stats {
  font-size: 0.72rem; color: var(--dark-text-muted);
}
.graph-scope {
  font-size: 0.72rem; color: var(--dark-text-muted);
  margin-left: 0.6rem; padding: 0.15rem 0.5rem;
  background: rgba(255,255,255,0.06); border-radius: var(--radius-sm);
}
.graph-scope a {
  color: var(--color-primary); text-decoration: none; font-size: 0.68rem;
}
.graph-scope a:hover { color: var(--color-primary-hover); text-decoration: underline; }

.graph-legend {
  position: absolute; bottom: 1.25rem; left: 1.25rem;
  background: var(--color-surface); border: 1px solid var(--color-border-light);
  border-radius: var(--radius-card); padding: 0.65rem 0.85rem;
  font-size: 0.7rem; color: var(--color-text-secondary);
  box-shadow: var(--shadow-card); z-index: 1;
}
.graph-legend .legend-title {
  font-weight: 600; margin-bottom: 0.35rem; color: var(--color-text);
}
.graph-legend .legend-item {
  display: flex; align-items: center; gap: 0.4rem; margin: 0.2rem 0;
  cursor: pointer; padding: 0.1rem 0.25rem; border-radius: 3px;
  transition: background 0.15s;
}
.graph-legend .legend-item:hover { background: rgba(130,130,130,0.15); }
.graph-legend .legend-item.active { background: rgba(130,130,130,0.25); font-weight: 600; }
.graph-legend .legend-item.dimmed { opacity: 0.4; }
.graph-legend .legend-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}

.graph-tooltip {
  position: absolute; pointer-events: none;
  background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: var(--radius-small); padding: 0.4rem 0.65rem;
  font-size: 0.72rem; color: var(--color-text);
  box-shadow: var(--shadow-card); z-index: 2;
  display: none; max-width: 280px;
}
.graph-tooltip .tt-path { color: var(--color-text-muted); font-size: 0.65rem; }
.graph-tooltip .tt-refs { color: var(--color-primary); margin-top: 0.15rem; }

/* ── Graph file preview panel ──────────────────────── */
.graph-preview {
  position: absolute; top: 0; right: 0; bottom: 0;
  width: min(420px, 45%); z-index: 3;
  background: var(--color-surface); border-left: 1px solid var(--color-border);
  display: flex; flex-direction: column;
  box-shadow: -4px 0 16px rgba(0,0,0,0.15);
  transform: translateX(100%); transition: transform 0.2s ease;
}
.graph-preview.visible { transform: translateX(0); }
.graph-preview-header {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.6rem 0.85rem; border-bottom: 1px solid var(--color-border-light);
  background: var(--color-surface-elevated, var(--color-surface));
}
.graph-preview-header h3 {
  flex: 1; font-size: 0.85rem; margin: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.graph-preview-header button {
  font-size: 0.7rem; padding: 0.2rem 0.55rem; cursor: pointer;
  background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: var(--radius-small); color: var(--color-text-secondary);
}
.graph-preview-header button:hover { background: var(--color-hover-bg); }
.graph-preview-meta {
  padding: 0.4rem 0.85rem; display: flex; gap: 0.4rem; flex-wrap: wrap;
}
.preview-tag {
  font-size: 0.62rem; padding: 0.12rem 0.4rem;
  background: rgba(130,130,130,0.15); border-radius: 3px;
  color: var(--color-text-secondary);
}
.preview-trust-high { background: rgba(76,175,80,0.18); color: #66bb6a; }
.preview-trust-med  { background: rgba(255,193,7,0.18); color: #ffc107; }
.preview-trust-low  { background: rgba(244,67,54,0.18); color: #ef5350; }
.graph-preview-body {
  flex: 1; overflow-y: auto; padding: 0.6rem 0.85rem;
  font-size: 0.78rem; line-height: 1.55;
}

.graph-progress {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  text-align: center; color: var(--color-text-secondary); z-index: 2;
}
.graph-progress .spinner {
  width: 32px; height: 32px; margin: 0 auto 0.75rem;
  border: 3px solid var(--color-border); border-top-color: var(--color-primary);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="knowledge-header">
  <div style="max-width:1020px;margin:0 auto;">
    <h1>Knowledge Base</h1>
    <p class="subtitle"><a href="dashboard.html" class="nav-link">&#8592; Dashboard</a> <a href="users.html" class="nav-link" style="margin-left:0.5rem">Users</a> <a href="projects.html" class="nav-link" style="margin-left:0.5rem">Projects</a> <a href="skills.html" class="nav-link" style="margin-left:0.5rem">Skills</a><button class="graph-toggle" id="graph-open-btn" title="View cross-reference graph">&#128476; Graph</button></p>
  </div>
</div>

<div class="knowledge-body">

<div class="error-banner" id="error-banner"></div>

<!-- Domain picker (shown when no domain is selected) -->
<div id="domain-picker">
  <div class="placeholder" id="placeholder">
    <div class="icon">&#128218;</div>
    <p>Loading knowledge domains&#8230;</p>
  </div>
</div>

<!-- Detail view (shown when a domain is selected) -->
<div id="detail-view" style="display:none">
  <div class="detail-breadcrumb" id="detail-breadcrumb"></div>
  <div class="detail-grid">
    <div class="detail-sidebar">
      <div class="sidebar-header" id="sidebar-header">Files</div>
      <div class="sidebar-body" id="sidebar-list"></div>
    </div>
    <div class="detail-content">
      <div class="content-header" id="content-header">Select a file</div>
      <div class="content-meta" id="content-meta" style="display:none"></div>
      <div class="content-body" id="content-body">
        <div class="content-placeholder">&#128196; Click a file in the sidebar to view it.</div>
      </div>
    </div>
  </div>
</div>

</div><!-- /knowledge-body -->

<!-- Graph overlay -->
<div class="graph-overlay" id="graph-overlay">
  <div class="graph-toolbar">
    <h2>&#128476; Knowledge Graph</h2>
    <span class="graph-stats" id="graph-stats"></span>
    <span class="graph-scope" id="graph-scope" style="display:none"></span>
    <span class="spacer"></span>
    <button id="graph-reset-btn" title="Reset zoom / re-layout">Reset</button>
    <button id="graph-close-btn">&#10005; Close</button>
  </div>
  <div style="position:relative;flex:1;overflow:hidden;">
    <canvas id="graph-canvas"></canvas>
    <div class="graph-progress" id="graph-progress" style="display:none;">
      <div class="spinner"></div>
      <div id="graph-progress-text">Scanning knowledge files&#8230;</div>
    </div>
    <div class="graph-legend" id="graph-legend"></div>
    <div class="graph-tooltip" id="graph-tooltip"></div>
    <div class="graph-preview" id="graph-preview">
      <div class="graph-preview-header">
        <h3 id="graph-preview-title"></h3>
        <button id="graph-preview-open">Open &#8594;</button>
        <button id="graph-preview-close">&#10005;</button>
      </div>
      <div class="graph-preview-meta" id="graph-preview-meta" style="display:none"></div>
      <div class="graph-preview-body" id="graph-preview-body"></div>
    </div>
  </div>
</div>

<noscript><p style="text-align:center;margin-top:3rem;color:#f87171;">JavaScript is required for the knowledge viewer.</p></noscript>

<script src="engram-utils.js"></script>
<script>
(function () {
  'use strict';

  var E = window.Engram;
  var el = E.el;
  var showError = E.showError;
  var readFile = E.readFile;
  var listDir = E.listDir;
  var parseFrontmatter = E.parseFrontmatter;
  var parseFlatYaml = E.parseFlatYaml;
  var parseMarkdownTable = E.parseMarkdownTable;
  var loadSavedHandle = E.loadSavedHandle;

  /* ── knowledge state ───────────────────────────────── */

  var rootHandle = null;
  var knowledgeBase = 'core/memory/knowledge';
  var detailPath = [];
  var activeFile = null;

  /* ── domain picker ─────────────────────────────────── */

  async function loadDomainPicker() {
    var picker = document.getElementById('domain-picker');
    picker.textContent = '';

    var summary = await readFile(rootHandle, 'core/memory/knowledge/SUMMARY.md');

    if (summary) {
      var parsed = parseFrontmatter(summary);
      var rows = parseMarkdownTable(parsed.body);

      if (rows.length > 0) {
        var headerLine = parsed.body.match(/^#[^#].*?(\d+)\s*files/m);
        if (headerLine) {
          var totalP = el('p', headerLine[0].replace(/^#\s*/, ''));
          totalP.style.marginBottom = '0.75rem';
          totalP.style.fontWeight = '500';
          picker.appendChild(totalP);
        }

        var grid = el('div', '', 'domain-cards');
        for (var i = 0; i < rows.length; i++) {
          var domain = (rows[i]['Domain'] || '').replace(/\[([^\]]+)\]\([^)]*\)/g, '$1').replace(/\//g, '');
          var files = rows[i]['Files'] || '';
          var scope = rows[i]['Scope'] || '';

          var card = el('div', '', 'domain-card');
          card.appendChild(el('div', domain, 'name'));
          card.appendChild(el('div', files + ' files', 'count'));
          if (scope) {
            var scopeP = el('div', scope.substring(0, 100));
            scopeP.style.fontSize = '0.7rem';
            scopeP.style.color = '#777';
            scopeP.style.marginTop = '0.2rem';
            card.appendChild(scopeP);
          }
          (function (domainName) {
            card.addEventListener('click', function () { openDomain(domainName); });
          })(domain);
          grid.appendChild(card);
        }
        picker.appendChild(grid);
        return;
      }
    }

    // Fallback: list subdirectories
    var listing = await listDir(rootHandle, 'core/memory/knowledge');
    var grid = el('div', '', 'domain-cards');
    for (var d = 0; d < listing.dirs.length; d++) {
      if (listing.dirs[d].startsWith('_')) continue;
      var card = el('div', '', 'domain-card');
      card.appendChild(el('div', listing.dirs[d], 'name'));
      (function (name) {
        card.addEventListener('click', function () { openDomain(name); });
      })(listing.dirs[d]);
      grid.appendChild(card);
    }
    picker.appendChild(grid);
  }

  /* ── detail view ───────────────────────────────────── */

  function openDomain(domain) {
    detailPath = [domain];
    activeFile = null;
    showDetailView();
  }

  function showDetailView() {
    document.getElementById('domain-picker').style.display = 'none';
    document.getElementById('detail-view').style.display = '';
    renderBreadcrumb();
    loadSidebar();
    clearContentPane();
  }

  function hideDetailView() {
    document.getElementById('detail-view').style.display = 'none';
    document.getElementById('domain-picker').style.display = '';
    detailPath = [];
    activeFile = null;
  }

  function renderBreadcrumb() {
    var bc = document.getElementById('detail-breadcrumb');
    bc.textContent = '';

    // Dashboard link
    var dash = el('a', '\u2190 Dashboard');
    dash.href = 'dashboard.html';
    bc.appendChild(dash);

    bc.appendChild(el('span', ' / ', 'sep'));

    // Knowledge root (back to domain picker)
    var root = el('a', 'Knowledge');
    root.addEventListener('click', hideDetailView);
    bc.appendChild(root);

    // Path segments
    for (var i = 0; i < detailPath.length; i++) {
      bc.appendChild(el('span', ' / ', 'sep'));
      if (i < detailPath.length - 1) {
        var link = el('a', detailPath[i]);
        (function (idx) {
          link.addEventListener('click', function () {
            detailPath = detailPath.slice(0, idx + 1);
            activeFile = null;
            renderBreadcrumb();
            loadSidebar();
            clearContentPane();
          });
        })(i);
        bc.appendChild(link);
      } else {
        bc.appendChild(el('span', detailPath[i], 'current'));
      }
    }

    if (activeFile) {
      bc.appendChild(el('span', ' / ', 'sep'));
      bc.appendChild(el('span', activeFile, 'current'));
    }
  }

  async function loadSidebar() {
    var body = document.getElementById('sidebar-list');
    body.textContent = '';
    var header = document.getElementById('sidebar-header');
    header.textContent = detailPath[detailPath.length - 1];

    var dirPath = knowledgeBase + '/' + detailPath.join('/');
    var listing = await listDir(rootHandle, dirPath);

    var ul = document.createElement('ul');

    // Subdirectories first
    for (var d = 0; d < listing.dirs.length; d++) {
      var dirName = listing.dirs[d];
      if (dirName.startsWith('_') || dirName === '__pycache__') continue;
      var li = document.createElement('li');
      li.appendChild(el('span', '\uD83D\uDCC1', 'icon'));
      li.appendChild(el('span', dirName + '/'));
      (function (name) {
        li.addEventListener('click', function () {
          detailPath.push(name);
          activeFile = null;
          renderBreadcrumb();
          loadSidebar();
          clearContentPane();
        });
      })(dirName);
      ul.appendChild(li);
    }

    // Then files
    var mdFiles = listing.files.filter(function (f) { return f.endsWith('.md'); });
    for (var f = 0; f < mdFiles.length; f++) {
      var fileName = mdFiles[f];
      var li = document.createElement('li');
      li.appendChild(el('span', '\uD83D\uDCC4', 'icon'));
      var label = el('span', fileName.replace(/\.md$/, ''));
      li.appendChild(label);
      (function (name, liEl) {
        liEl.addEventListener('click', function () {
          var prev = ul.querySelector('li.active');
          if (prev) prev.classList.remove('active');
          liEl.classList.add('active');
          viewFile(name);
        });
      })(fileName, li);
      ul.appendChild(li);
    }

    // Also show non-md files
    var otherFiles = listing.files.filter(function (f) { return !f.endsWith('.md'); });
    for (var o = 0; o < otherFiles.length; o++) {
      var ofName = otherFiles[o];
      var li = document.createElement('li');
      li.appendChild(el('span', '\uD83D\uDCCE', 'icon'));
      li.appendChild(el('span', ofName));
      li.style.color = '#999';
      ul.appendChild(li);
    }

    if (ul.children.length === 0) {
      body.appendChild(el('p', 'Empty folder.'));
      body.lastChild.style.padding = '1rem';
      body.lastChild.style.color = '#999';
      body.lastChild.style.fontSize = '0.8rem';
    } else {
      body.appendChild(ul);
    }
  }

  function clearContentPane() {
    document.getElementById('content-header').textContent = 'Select a file';
    document.getElementById('content-meta').style.display = 'none';
    document.getElementById('content-meta').textContent = '';
    var body = document.getElementById('content-body');
    body.textContent = '';
    var ph = el('div', '', 'content-placeholder');
    ph.textContent = '\uD83D\uDCC4 Click a file in the sidebar to view it.';
    body.appendChild(ph);
  }

  /**
   * Resolve a cross-reference path to {dir: [...segments], file: 'name.md'}
   * relative to the knowledge base root.
   */
  function resolveKnowledgePath(ref) {
    var path = ref.replace(/^knowledge\//, '');
    if (path.match(/^\.\.\//) || path.match(/^\.\//) ) {
      var base = detailPath.slice();
      var parts = path.split('/');
      for (var k = 0; k < parts.length; k++) {
        if (parts[k] === '..') base.pop();
        else if (parts[k] !== '.') base.push(parts[k]);
      }
      path = base.join('/');
    }
    var segments = path.split('/');
    var file = segments.pop();
    return { dir: segments, file: file };
  }

  function navigateToFile(ref) {
    var resolved = resolveKnowledgePath(ref);
    if (!resolved.file) return;
    detailPath = resolved.dir;
    showDetailView();
    viewFile(resolved.file);
  }

  async function viewFile(filename) {
    activeFile = filename;
    renderBreadcrumb();

    var filePath = knowledgeBase + '/' + detailPath.join('/') + '/' + filename;
    var content = await readFile(rootHandle, filePath);

    var header = document.getElementById('content-header');
    header.textContent = filename;

    var meta = document.getElementById('content-meta');
    meta.textContent = '';
    meta.style.display = 'none';

    var body = document.getElementById('content-body');
    body.textContent = '';

    if (!content) {
      body.appendChild(el('p', 'Could not read file.'));
      return;
    }

    var parsed = parseFrontmatter(content);

    // Render frontmatter metadata
    if (parsed.frontmatter) {
      var fm = parseFlatYaml(parsed.frontmatter);
      meta.style.display = '';

      var fields = ['trust', 'source', 'created', 'last_verified', 'origin_session', 'topic', 'type', 'related'];
      for (var i = 0; i < fields.length; i++) {
        var key = fields[i];
        if (!fm[key]) continue;
        var item = el('span', '', 'meta-item');
        item.appendChild(el('span', key + ':', 'meta-label'));
        if (key === 'trust') {
          var trustVal = fm[key].toLowerCase();
          var cls = 'badge badge-' + (trustVal === 'high' ? 'high' : trustVal === 'medium' ? 'medium' : 'low');
          item.appendChild(el('span', fm[key], cls));
        } else if (key === 'related') {
          var refs = fm[key].split(/,\s*/);
          for (var r = 0; r < refs.length; r++) {
            if (r > 0) item.appendChild(document.createTextNode(', '));
            var refPath = refs[r].trim();
            if (refPath.match(/\.md$/i)) {
              var ra = document.createElement('a');
              ra.className = 'knowledge-xref';
              ra.textContent = refPath.replace(/\.md$/, '').split('/').pop();
              ra.title = refPath;
              (function(ref) { ra.addEventListener('click', function() { navigateToFile(ref); }); })(refPath);
              item.appendChild(document.createTextNode(' '));
              item.appendChild(ra);
            } else {
              item.appendChild(document.createTextNode(' ' + refPath));
            }
          }
        } else {
          item.appendChild(document.createTextNode(' ' + fm[key]));
        }
        meta.appendChild(item);
      }
    }

    // Render body as styled markdown
    renderMarkdown(parsed.body.trim(), body);
  }

  /* ── markdown renderer ─────────────────────────────── */

  /**
   * Lightweight markdown-to-DOM renderer.
   * Produces real DOM nodes via safe construction (no innerHTML).
   * Supports: headings, bold, italic, inline code, links, lists (nested),
   *           ordered lists, blockquotes, horizontal rules, code blocks, tables.
   */
  function renderMarkdown(text, container) {
    var lines = text.split(/\r?\n/);
    var i = 0;

    while (i < lines.length) {
      var line = lines[i];

      // Blank line — skip
      if (!line.trim()) { i++; continue; }

      // Fenced code block
      if (line.match(/^```/)) {
        var lang = line.replace(/^```/, '').trim();
        var codeLines = [];
        i++;
        while (i < lines.length && !lines[i].match(/^```/)) {
          codeLines.push(lines[i]); i++;
        }
        i++; // skip closing ```
        var pre = document.createElement('pre');
        var code = document.createElement('code');
        code.textContent = codeLines.join('\n');
        pre.appendChild(code);
        container.appendChild(pre);
        continue;
      }

      // Horizontal rule
      if (line.match(/^\s*(-{3,}|\*{3,}|_{3,})\s*$/)) {
        container.appendChild(document.createElement('hr'));
        i++; continue;
      }

      // Heading
      var hm = line.match(/^(#{1,4})\s+(.+)/);
      if (hm) {
        var h = document.createElement('h' + hm[1].length);
        appendInline(h, hm[2]);
        container.appendChild(h);
        i++; continue;
      }

      // Table (line contains | and next line is separator)
      if (line.indexOf('|') >= 0 && i + 1 < lines.length && lines[i + 1].match(/^[\s|:-]+$/)) {
        i = renderTable(lines, i, container);
        continue;
      }

      // Blockquote
      if (line.match(/^>\s?/)) {
        var bq = document.createElement('blockquote');
        var bqLines = [];
        while (i < lines.length && lines[i].match(/^>\s?/)) {
          bqLines.push(lines[i].replace(/^>\s?/, ''));
          i++;
        }
        renderMarkdown(bqLines.join('\n'), bq);
        container.appendChild(bq);
        continue;
      }

      // Unordered list
      if (line.match(/^\s*[-*+]\s/)) {
        i = renderList(lines, i, container, 'ul');
        continue;
      }

      // Ordered list
      if (line.match(/^\s*\d+\.\s/)) {
        i = renderList(lines, i, container, 'ol');
        continue;
      }

      // Paragraph
      var paraLines = [];
      while (i < lines.length && lines[i].trim() &&
             !lines[i].match(/^(#{1,4}\s|```|>\s?|\s*[-*+]\s|\s*\d+\.\s|\s*(-{3,}|\*{3,}|_{3,})\s*$)/) &&
             !(lines[i].indexOf('|') >= 0 && i + 1 < lines.length && lines[i + 1] && lines[i + 1].match(/^[\s|:-]+$/))) {
        paraLines.push(lines[i]); i++;
      }
      var p = document.createElement('p');
      appendInline(p, paraLines.join(' '));
      container.appendChild(p);
    }
  }

  function renderTable(lines, i, container) {
    var headerLine = lines[i];
    var headers = headerLine.split('|').map(function (c) { return c.trim(); }).filter(Boolean);
    i += 2;

    var table = document.createElement('table');
    var thead = document.createElement('thead');
    var headRow = document.createElement('tr');
    for (var h = 0; h < headers.length; h++) {
      var th = document.createElement('th');
      appendInline(th, headers[h]);
      headRow.appendChild(th);
    }
    thead.appendChild(headRow);
    table.appendChild(thead);

    var tbody = document.createElement('tbody');
    while (i < lines.length && lines[i].indexOf('|') >= 0 && lines[i].trim()) {
      var cells = lines[i].split('|').map(function (c) { return c.trim(); }).filter(Boolean);
      var tr = document.createElement('tr');
      for (var c = 0; c < headers.length; c++) {
        var td = document.createElement('td');
        appendInline(td, cells[c] || '');
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
      i++;
    }
    table.appendChild(tbody);
    container.appendChild(table);
    return i;
  }

  function renderList(lines, i, container, tag) {
    var list = document.createElement(tag);
    var pattern = tag === 'ul' ? /^(\s*)[-*+]\s(.*)/ : /^(\s*)\d+\.\s(.*)/ ;
    var baseIndent = (lines[i].match(/^(\s*)/) || ['',''])[1].length;

    while (i < lines.length) {
      var m = lines[i].match(pattern);
      if (!m) break;
      var indent = m[1].length;
      if (indent < baseIndent) break;

      if (indent > baseIndent) {
        var lastLi = list.lastElementChild;
        if (lastLi) {
          i = renderList(lines, i, lastLi, tag);
        } else {
          i++;
        }
        continue;
      }

      var li = document.createElement('li');
      appendInline(li, m[2]);
      list.appendChild(li);
      i++;

      while (i < lines.length && lines[i].trim() && !lines[i].match(pattern) &&
             !lines[i].match(/^\s*(#{1,4}\s|```|>\s?|\s*(-{3,}|\*{3,}|_{3,})\s*$)/) &&
             (lines[i].match(/^\s/) || false)) {
        var contIndent = (lines[i].match(/^(\s*)/) || ['',''])[1].length;
        if (contIndent <= baseIndent) break;
        li.appendChild(document.createTextNode(' ' + lines[i].trim()));
        i++;
      }
    }
    container.appendChild(list);
    return i;
  }

  function appendInline(parent, text) {
    if (!text) return;
    var rx = /(`[^`]+`)|\*\*(.+?)\*\*|\*(.+?)\*|\[([^\]]+)\]\(([^)]+)\)/g;
    var last = 0;
    var match;
    while ((match = rx.exec(text)) !== null) {
      if (match.index > last) {
        parent.appendChild(document.createTextNode(text.substring(last, match.index)));
      }
      if (match[1]) {
        var codeText = match[1].slice(1, -1);
        if (codeText.match(/\.md$/i)) {
          var xa = document.createElement('a');
          xa.className = 'knowledge-xref';
          xa.textContent = codeText.replace(/\.md$/, '').split('/').pop();
          xa.title = codeText;
          (function(ref) { xa.addEventListener('click', function() { navigateToFile(ref); }); })(codeText);
          parent.appendChild(xa);
        } else {
          var code = document.createElement('code');
          code.textContent = codeText;
          parent.appendChild(code);
        }
      } else if (match[2]) {
        var strong = document.createElement('strong');
        strong.textContent = match[2];
        parent.appendChild(strong);
      } else if (match[3]) {
        var em = document.createElement('em');
        em.textContent = match[3];
        parent.appendChild(em);
      } else if (match[4] && match[5]) {
        var href = match[5];
        if (href.match(/\.md$/i) && !href.match(/^https?:\/\//i)) {
          var xlink = document.createElement('a');
          xlink.className = 'knowledge-xref';
          xlink.textContent = match[4];
          xlink.title = href;
          (function(ref) { xlink.addEventListener('click', function() { navigateToFile(ref); }); })(href);
          parent.appendChild(xlink);
        } else if (href.match(/^(https?:\/\/|[a-zA-Z0-9]|\.\/)/) && !href.match(/^javascript:/i)) {
          var a = document.createElement('a');
          a.textContent = match[4];
          a.href = href;
          a.rel = 'noopener noreferrer';
          a.target = '_blank';
          parent.appendChild(a);
        } else {
          parent.appendChild(document.createTextNode(match[0]));
        }
      }
      last = match.index + match[0].length;
    }
    if (last < text.length) {
      parent.appendChild(document.createTextNode(text.substring(last)));
    }
  }

  /* ── cross-reference graph ───────────────────────────── */

  var DOMAIN_COLORS = {
    'ai':                    '#6ec6ff',
    'cognitive-science':     '#b39ddb',
    'literature':            '#ffab91',
    'mathematics':           '#80cbc4',
    'philosophy':            '#fff59d',
    'rationalist-community': '#ef9a9a',
    'self':                  '#a5d6a7',
    'social-science':        '#ce93d8',
    'software-engineering':  '#90caf9',
    '_unverified':           '#757575'
  };
  var DOMAIN_DEFAULT_COLOR = '#888888';

  /**
   * Resolve a cross-reference to a canonical knowledge-relative path.
   * sourceDir is the directory segments of the file containing the reference.
   */
  function resolveGraphRef(ref, sourceDir) {
    var path = ref.replace(/^knowledge\//, '');
    // Strip self/ prefix that references files by area rather than knowledge path
    if (path.match(/^(self|_unverified)\//)) {
      // these are already relative to knowledge root
    } else if (path.match(/^\.\.\//) || path.match(/^\.\//)) {
      var base = sourceDir.slice();
      var parts = path.split('/');
      for (var k = 0; k < parts.length; k++) {
        if (parts[k] === '..') base.pop();
        else if (parts[k] !== '.') base.push(parts[k]);
      }
      path = base.join('/');
    }
    // Ensure .md extension
    if (!path.match(/\.md$/i)) path += '.md';
    return path;
  }

  /** Extract cross-references from a file's content. Returns array of raw ref strings. */
  function extractRefs(content) {
    var refs = [];
    var parsed = parseFrontmatter(content);

    // 1) related: frontmatter field
    if (parsed.frontmatter) {
      var fm = parseFlatYaml(parsed.frontmatter);
      if (fm.related) {
        var items = fm.related.split(/,\s*/);
        for (var i = 0; i < items.length; i++) {
          var r = items[i].trim();
          if (r && r.match(/\.md$/i)) refs.push(r);
        }
      }
      // Handle YAML list format in frontmatter
      var listMatch = parsed.frontmatter.match(/^related:\s*\n((?:\s+-\s+.+\n?)+)/m);
      if (listMatch) {
        var listItems = listMatch[1].match(/^\s+-\s+(.+)/gm);
        if (listItems) {
          for (var j = 0; j < listItems.length; j++) {
            var val = listItems[j].replace(/^\s+-\s+/, '').trim();
            if (val) refs.push(val.match(/\.md$/i) ? val : val + '.md');
          }
        }
      }
    }

    // 2) Markdown links to .md files in body
    var linkRx = /\[([^\]]*)\]\(([^)]+\.md)\)/gi;
    var m;
    while ((m = linkRx.exec(parsed.body)) !== null) {
      if (!m[2].match(/^https?:\/\//i)) refs.push(m[2]);
    }

    // 3) Backtick-wrapped .md file references in body
    var btRx = /`([^`]+\.md)`/gi;
    while ((m = btRx.exec(parsed.body)) !== null) {
      refs.push(m[1]);
    }

    return refs;
  }

  /** Recursively collect all .md files under a directory. Returns [{path, dirSegments}]. */
  async function collectFiles(handle, prefix) {
    var results = [];
    var listing = await listDir(handle, prefix);

    for (var f = 0; f < listing.files.length; f++) {
      if (listing.files[f].endsWith('.md')) {
        var segments = prefix.split('/').filter(Boolean);
        // Remove the knowledgeBase prefix to get knowledge-relative segments
        var kbParts = knowledgeBase.split('/');
        var relSegments = segments.slice(kbParts.length);
        results.push({
          path: (relSegments.length ? relSegments.join('/') + '/' : '') + listing.files[f],
          dirSegments: relSegments
        });
      }
    }

    for (var d = 0; d < listing.dirs.length; d++) {
      var dirName = listing.dirs[d];
      if (dirName === '__pycache__') continue;
      var sub = await collectFiles(handle, prefix + '/' + dirName);
      for (var s = 0; s < sub.length; s++) results.push(sub[s]);
    }
    return results;
  }

  /**
   * Build graph: {nodes: [{id, domain, label, external}], edges: [{source, target}]}.
   * filterPrefix: optional directory prefix (e.g. 'philosophy/ethics') to scope the graph.
   * When scoped, external nodes (referenced but outside scope) are included as dimmed nodes.
   */
  async function buildGraph(progressCb, filterPrefix) {
    var scanRoot = knowledgeBase;
    if (filterPrefix) scanRoot = knowledgeBase + '/' + filterPrefix;
    var files = await collectFiles(rootHandle, scanRoot);
    if (progressCb) progressCb('Found ' + files.length + ' files, scanning\u2026');

    // When scoped, file paths from collectFiles are relative to scanRoot.
    // Remap them to be knowledge-root-relative so resolveGraphRef still works.
    if (filterPrefix) {
      for (var fi = 0; fi < files.length; fi++) {
        files[fi].path = filterPrefix + '/' + files[fi].path;
        // dirSegments = directory part of the knowledge-relative path
        var pathParts = files[fi].path.split('/');
        files[fi].dirSegments = pathParts.slice(0, pathParts.length - 1);
      }
    }

    var nodeMap = {};
    var edges = [];

    // Create nodes for in-scope files
    for (var i = 0; i < files.length; i++) {
      var fpath = files[i].path;
      var domain = files[i].dirSegments[0] || '_root';
      nodeMap[fpath] = {
        id: fpath,
        domain: domain,
        label: fpath.split('/').pop().replace(/\.md$/, ''),
        refs: 0, refBy: 0,
        external: false
      };
    }

    // Scan for edges
    var batchSize = 20;
    var pendingExternal = [];  // refs that point outside the scoped set
    for (var b = 0; b < files.length; b += batchSize) {
      var batch = files.slice(b, Math.min(b + batchSize, files.length));
      var reads = batch.map(function (f) {
        return readFile(rootHandle, knowledgeBase + '/' + f.path);
      });
      var contents = await Promise.all(reads);
      for (var j = 0; j < batch.length; j++) {
        if (!contents[j]) continue;
        var rawRefs = extractRefs(contents[j]);
        var sourceId = batch[j].path;
        var seen = {};
        for (var r = 0; r < rawRefs.length; r++) {
          var targetId = resolveGraphRef(rawRefs[r], batch[j].dirSegments);
          if (targetId === sourceId || seen[targetId]) continue;
          seen[targetId] = true;
          if (nodeMap[targetId]) {
            edges.push({ source: sourceId, target: targetId });
            nodeMap[sourceId].refs++;
            nodeMap[targetId].refBy++;
          } else if (filterPrefix) {
            // Track cross-scope reference for external node creation
            pendingExternal.push({ source: sourceId, target: targetId });
          }
        }
      }
      if (progressCb) progressCb('Scanned ' + Math.min(b + batchSize, files.length) + ' / ' + files.length);
    }

    // When scoped, add external nodes for cross-scope references
    if (filterPrefix && pendingExternal.length > 0) {
      for (var pe = 0; pe < pendingExternal.length; pe++) {
        var tid = pendingExternal[pe].target;
        if (!nodeMap[tid]) {
          var tParts = tid.split('/');
          var tDomain = tParts[0] || '_root';
          nodeMap[tid] = {
            id: tid,
            domain: tDomain,
            label: tParts[tParts.length - 1].replace(/\.md$/, ''),
            refs: 0, refBy: 0,
            external: true
          };
        }
        edges.push({ source: pendingExternal[pe].source, target: tid });
        nodeMap[pendingExternal[pe].source].refs++;
        nodeMap[tid].refBy++;
      }
    }

    var nodes = [];
    for (var id in nodeMap) nodes.push(nodeMap[id]);
    return { nodes: nodes, edges: edges, scope: filterPrefix || null };
  }

  /* ── Force-directed layout + canvas renderer ────────── */

  var graphSim = null;

  function startGraph(graph) {
    var overlay = document.getElementById('graph-overlay');
    var canvas = document.getElementById('graph-canvas');
    var ctx = canvas.getContext('2d');
    var tooltip = document.getElementById('graph-tooltip');
    var legend = document.getElementById('graph-legend');
    var stats = document.getElementById('graph-stats');

    // Stats
    stats.textContent = graph.nodes.length + ' files \u00B7 ' + graph.edges.length + ' links';

    // Size canvas
    function resize() {
      canvas.width = canvas.parentElement.clientWidth;
      canvas.height = canvas.parentElement.clientHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Build legend (clickable domain filter)
    legend.textContent = '';
    var ltitle = el('div', 'Domains', 'legend-title');
    legend.appendChild(ltitle);
    var domainsSeen = {};
    for (var i = 0; i < graph.nodes.length; i++) {
      domainsSeen[graph.nodes[i].domain] = true;
    }
    var selectedDomain = null;
    var legendItems = {};
    for (var d in domainsSeen) {
      var item = el('div', '', 'legend-item');
      var dot = el('span', '', 'legend-dot');
      dot.style.background = DOMAIN_COLORS[d] || DOMAIN_DEFAULT_COLOR;
      item.appendChild(dot);
      item.appendChild(el('span', d));
      item.dataset.domain = d;
      legendItems[d] = item;
      (function (domain, itemEl) {
        itemEl.addEventListener('click', function () {
          if (selectedDomain === domain) {
            selectedDomain = null;  // toggle off
          } else {
            selectedDomain = domain;
          }
          // Update legend item styles
          for (var key in legendItems) {
            legendItems[key].classList.remove('active', 'dimmed');
            if (selectedDomain) {
              legendItems[key].classList.add(key === selectedDomain ? 'active' : 'dimmed');
            }
          }
        });
      })(d, item);
      legend.appendChild(item);
    }

    // Initialize node positions
    var W = canvas.width, H = canvas.height;
    var nodes = graph.nodes;
    var edges = graph.edges;

    // Index for fast lookup
    var idxMap = {};
    for (var n = 0; n < nodes.length; n++) {
      idxMap[nodes[n].id] = n;
      nodes[n].x = W / 2 + (Math.random() - 0.5) * W * 0.6;
      nodes[n].y = H / 2 + (Math.random() - 0.5) * H * 0.6;
      nodes[n].vx = 0;
      nodes[n].vy = 0;
      nodes[n].degree = nodes[n].refs + nodes[n].refBy;
    }

    // Indexed edges
    var edgeIdx = edges.map(function (e) {
      return { s: idxMap[e.source], t: idxMap[e.target] };
    });

    // Adjacency list for hover highlight
    var adj = {};
    for (var e = 0; e < edges.length; e++) {
      var si = idxMap[edges[e].source], ti = idxMap[edges[e].target];
      if (!adj[si]) adj[si] = [];
      if (!adj[ti]) adj[ti] = [];
      adj[si].push(ti);
      adj[ti].push(si);
    }

    // Camera — centered on the node cloud
    var cam = { x: W / 2, y: H / 2, zoom: 1 };
    var dragging = false, dragStart = null, camStart = null;
    var hoveredNode = -1;
    var dragNode = -1;

    // Fit camera to show all nodes with padding
    function fitToView() {
      if (nodes.length === 0) return;
      var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      for (var i = 0; i < nodes.length; i++) {
        if (nodes[i].x < minX) minX = nodes[i].x;
        if (nodes[i].x > maxX) maxX = nodes[i].x;
        if (nodes[i].y < minY) minY = nodes[i].y;
        if (nodes[i].y > maxY) maxY = nodes[i].y;
      }
      var pad = 40;
      var bw = (maxX - minX) + pad * 2;
      var bh = (maxY - minY) + pad * 2;
      cam.x = (minX + maxX) / 2;
      cam.y = (minY + maxY) / 2;
      cam.zoom = Math.min(canvas.width / bw, canvas.height / bh, 1);
      cam.zoom = Math.max(0.1, cam.zoom);
    }

    function screenToWorld(sx, sy) {
      return {
        x: (sx - canvas.width / 2) / cam.zoom + cam.x,
        y: (sy - canvas.height / 2) / cam.zoom + cam.y
      };
    }

    function nodeAt(wx, wy) {
      // Expand hit area when zoomed out so nodes stay easy to target
      var pad = Math.max(6, 12 / cam.zoom);
      for (var i = nodes.length - 1; i >= 0; i--) {
        var r = nodeRadius(nodes[i]) / cam.zoom;
        var dx = nodes[i].x - wx, dy = nodes[i].y - wy;
        if (dx * dx + dy * dy < (r + pad) * (r + pad)) return i;
      }
      return -1;
    }

    function nodeRadius(node) {
      return Math.min(3 + node.degree * 1.2, 18);
    }

    // Interaction
    canvas.addEventListener('mousedown', function (ev) {
      var rect = canvas.getBoundingClientRect();
      var sx = ev.clientX - rect.left, sy = ev.clientY - rect.top;
      var w = screenToWorld(sx, sy);
      var hit = nodeAt(w.x, w.y);
      if (hit >= 0) {
        dragNode = hit;
        nodes[hit].pinned = true;
      } else {
        dragging = true;
        dragStart = { x: ev.clientX, y: ev.clientY };
        camStart = { x: cam.x, y: cam.y };
      }
    });

    canvas.addEventListener('mousemove', function (ev) {
      var rect = canvas.getBoundingClientRect();
      var sx = ev.clientX - rect.left, sy = ev.clientY - rect.top;
      if (dragNode >= 0) {
        var w = screenToWorld(sx, sy);
        nodes[dragNode].x = w.x;
        nodes[dragNode].y = w.y;
        nodes[dragNode].vx = 0;
        nodes[dragNode].vy = 0;
        return;
      }
      if (dragging) {
        cam.x = camStart.x - (ev.clientX - dragStart.x) / cam.zoom;
        cam.y = camStart.y - (ev.clientY - dragStart.y) / cam.zoom;
        return;
      }
      var w = screenToWorld(sx, sy);
      var hit = nodeAt(w.x, w.y);
      hoveredNode = hit;
      canvas.style.cursor = hit >= 0 ? 'pointer' : 'grab';

      if (hit >= 0) {
        var node = nodes[hit];
        tooltip.style.display = '';
        tooltip.style.left = (ev.clientX - rect.left + 12) + 'px';
        tooltip.style.top = (ev.clientY - rect.top - 8) + 'px';
        tooltip.innerHTML = '';
        tooltip.appendChild(el('div', node.label));
        tooltip.appendChild(el('div', node.id, 'tt-path'));
        tooltip.appendChild(el('div', node.refs + ' out \u00B7 ' + node.refBy + ' in', 'tt-refs'));
      } else {
        tooltip.style.display = 'none';
      }
    });

    canvas.addEventListener('mouseup', function () {
      if (dragNode >= 0) {
        nodes[dragNode].pinned = false;
        dragNode = -1;
      }
      dragging = false;
    });

    // Preview panel for double-click
    var preview = document.getElementById('graph-preview');
    var previewTitle = document.getElementById('graph-preview-title');
    var previewMeta = document.getElementById('graph-preview-meta');
    var previewBody = document.getElementById('graph-preview-body');
    var previewOpen = document.getElementById('graph-preview-open');
    var previewClose = document.getElementById('graph-preview-close');
    var previewNodeId = null;

    function closePreview() {
      preview.classList.remove('visible');
      previewNodeId = null;
    }

    previewClose.addEventListener('click', closePreview);

    canvas.addEventListener('dblclick', async function (ev) {
      var rect = canvas.getBoundingClientRect();
      var sx = ev.clientX - rect.left, sy = ev.clientY - rect.top;
      var w = screenToWorld(sx, sy);
      var hit = nodeAt(w.x, w.y);
      if (hit < 0) { closePreview(); return; }

      var node = nodes[hit];
      previewNodeId = node.id;

      // Show panel immediately with loading state
      previewTitle.textContent = node.label;
      previewMeta.textContent = '';
      previewMeta.style.display = 'none';
      previewBody.textContent = 'Loading\u2026';
      preview.classList.add('visible');

      // Wire up "Open file" button
      previewOpen.onclick = function () {
        var segs = node.id.split('/');
        var file = segs.pop();
        detailPath = segs;
        closePreview();
        document.getElementById('graph-overlay').classList.remove('visible');
        if (graphSim) { graphSim.stop(); graphSim = null; }
        showDetailView();
        viewFile(file);
      };

      // Read and render the file
      var content = await readFile(rootHandle, knowledgeBase + '/' + node.id);
      if (previewNodeId !== node.id) return;  // user moved on

      if (!content) {
        previewBody.textContent = 'Could not read file.';
        return;
      }

      var parsed = parseFrontmatter(content);

      // Show frontmatter badges
      if (parsed.frontmatter) {
        var fm = parseFlatYaml(parsed.frontmatter);
        previewMeta.textContent = '';
        previewMeta.style.display = '';
        var metaFields = ['trust', 'type', 'source', 'created'];
        for (var mf = 0; mf < metaFields.length; mf++) {
          if (!fm[metaFields[mf]]) continue;
          var tag = el('span', metaFields[mf] + ': ' + fm[metaFields[mf]], 'preview-tag');
          if (metaFields[mf] === 'trust') {
            var tv = fm.trust.toLowerCase();
            tag.className = 'preview-tag preview-trust-' + (tv === 'high' ? 'high' : tv === 'medium' ? 'med' : 'low');
          }
          previewMeta.appendChild(tag);
        }
        if (previewMeta.childNodes.length === 0) previewMeta.style.display = 'none';
      }

      // Render body
      previewBody.textContent = '';
      renderMarkdown(parsed.body.trim(), previewBody);
    });

    canvas.addEventListener('wheel', function (ev) {
      ev.preventDefault();
      var factor = ev.deltaY < 0 ? 1.12 : 1 / 1.12;
      cam.zoom = Math.max(0.1, Math.min(8, cam.zoom * factor));
    }, { passive: false });

    // Physics step
    function step() {
      var alpha = 0.3;
      var repulsion = 800;
      var springLen = 80;
      var springK = 0.015;
      var centerK = 0.002;
      var damping = 0.88;

      // Center gravity
      for (var i = 0; i < nodes.length; i++) {
        if (nodes[i].pinned) continue;
        nodes[i].vx += (W / 2 - nodes[i].x) * centerK;
        nodes[i].vy += (H / 2 - nodes[i].y) * centerK;
      }

      // Repulsion (Barnes-Hut would be better for 1000+ nodes, but brute force is fine for ~500)
      for (var i = 0; i < nodes.length; i++) {
        if (nodes[i].pinned) continue;
        for (var j = i + 1; j < nodes.length; j++) {
          var dx = nodes[i].x - nodes[j].x;
          var dy = nodes[i].y - nodes[j].y;
          var dist2 = dx * dx + dy * dy;
          if (dist2 < 1) dist2 = 1;
          var force = repulsion / dist2;
          var fx = dx * force;
          var fy = dy * force;
          nodes[i].vx += fx;
          nodes[i].vy += fy;
          if (!nodes[j].pinned) {
            nodes[j].vx -= fx;
            nodes[j].vy -= fy;
          }
        }
      }

      // Spring attraction along edges
      for (var e = 0; e < edgeIdx.length; e++) {
        var a = nodes[edgeIdx[e].s], b = nodes[edgeIdx[e].t];
        var dx = b.x - a.x, dy = b.y - a.y;
        var dist = Math.sqrt(dx * dx + dy * dy) || 1;
        var disp = (dist - springLen) * springK;
        var fx = dx / dist * disp;
        var fy = dy / dist * disp;
        if (!a.pinned) { a.vx += fx; a.vy += fy; }
        if (!b.pinned) { b.vx -= fx; b.vy -= fy; }
      }

      // Velocity integration
      for (var i = 0; i < nodes.length; i++) {
        if (nodes[i].pinned) continue;
        nodes[i].vx *= damping;
        nodes[i].vy *= damping;
        nodes[i].x += nodes[i].vx * alpha;
        nodes[i].y += nodes[i].vy * alpha;
      }
    }

    // Render
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      ctx.translate(canvas.width / 2, canvas.height / 2);
      ctx.scale(cam.zoom, cam.zoom);
      ctx.translate(-cam.x, -cam.y);

      // Highlighted neighbors (hover takes priority, then domain filter)
      var highlightSet = {};
      var hoverActive = hoveredNode >= 0;
      if (hoverActive) {
        highlightSet[hoveredNode] = true;
        var neighbors = adj[hoveredNode] || [];
        for (var h = 0; h < neighbors.length; h++) highlightSet[neighbors[h]] = true;
      }
      // Domain filter: build set of indices matching selectedDomain
      var domainSet = {};
      var domainActive = selectedDomain !== null;
      if (domainActive) {
        for (var di = 0; di < nodes.length; di++) {
          if (nodes[di].domain === selectedDomain) domainSet[di] = true;
        }
      }
      var hasHighlight = hoverActive || domainActive;

      // Edges
      for (var e = 0; e < edgeIdx.length; e++) {
        var a = nodes[edgeIdx[e].s], b = nodes[edgeIdx[e].t];
        var edgeHover = hoverActive && highlightSet[edgeIdx[e].s] && highlightSet[edgeIdx[e].t];
        var edgeDomain = !hoverActive && domainActive && (domainSet[edgeIdx[e].s] || domainSet[edgeIdx[e].t]);
        var highlighted = edgeHover || edgeDomain;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = highlighted ? 'rgba(194,180,154,0.6)' : 'rgba(194,180,154,0.1)';
        ctx.lineWidth = highlighted ? 1.5 / cam.zoom : 0.5 / cam.zoom;
        ctx.stroke();
      }

      // Nodes
      for (var i = 0; i < nodes.length; i++) {
        var node = nodes[i];
        var r = nodeRadius(node);
        var color = DOMAIN_COLORS[node.domain] || DOMAIN_DEFAULT_COLOR;
        var dimmedByHover = hoverActive && !highlightSet[i];
        var dimmedByDomain = !hoverActive && domainActive && !domainSet[i];
        var dimmed = dimmedByHover || dimmedByDomain;
        var isExternal = node.external;

        ctx.beginPath();
        ctx.arc(node.x, node.y, r / cam.zoom, 0, Math.PI * 2);
        if (isExternal) {
          ctx.fillStyle = 'rgba(60,55,50,0.3)';
          ctx.fill();
          ctx.setLineDash([3 / cam.zoom, 3 / cam.zoom]);
          ctx.strokeStyle = dimmed ? 'rgba(120,115,110,0.3)' : color;
          ctx.lineWidth = 1.5 / cam.zoom;
          ctx.stroke();
          ctx.setLineDash([]);
        } else {
          ctx.fillStyle = dimmed ? 'rgba(60,55,50,0.5)' : color;
          ctx.fill();
        }

        if (i === hoveredNode) {
          ctx.setLineDash([]);
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2 / cam.zoom;
          ctx.stroke();
        }
      }

      // Labels for hovered + neighbors, domain-selected, or high-degree nodes when zoomed in
      var labelThreshold = cam.zoom > 1.5 ? 3 : cam.zoom > 0.8 ? 6 : 999;
      ctx.font = Math.max(9, 11 / cam.zoom) + 'px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      for (var i = 0; i < nodes.length; i++) {
        var showByHover = hoverActive && highlightSet[i];
        var showByDomain = !hoverActive && domainActive && domainSet[i];
        var showByDegree = !hasHighlight && nodes[i].degree >= labelThreshold;
        if (!showByHover && !showByDomain && !showByDegree) continue;
        var node = nodes[i];
        var r = nodeRadius(node);
        ctx.fillStyle = 'rgba(232,226,217,0.9)';
        ctx.fillText(node.label, node.x, node.y + r / cam.zoom + 3 / cam.zoom);
      }

      ctx.restore();
    }

    var running = true;
    var frameCount = 0;
    function loop() {
      if (!running) return;
      step();
      frameCount++;
      // After warm-up, fit camera to show the full graph
      if (frameCount === 80) fitToView();
      draw();
      requestAnimationFrame(loop);
    }
    loop();

    // Reset button
    document.getElementById('graph-reset-btn').onclick = function () {
      for (var i = 0; i < nodes.length; i++) {
        nodes[i].x = W / 2 + (Math.random() - 0.5) * W * 0.6;
        nodes[i].y = H / 2 + (Math.random() - 0.5) * H * 0.6;
        nodes[i].vx = 0;
        nodes[i].vy = 0;
      }
      frameCount = 0;
    };

    // Return stop handle
    graphSim = {
      stop: function () {
        running = false;
        window.removeEventListener('resize', resize);
      }
    };
  }

  var graphCache = {};  // keyed by scope prefix ('' = full)

  async function openGraph(scopeOverride) {
    // Determine scope: explicit override, current detailPath, or full graph
    var scope;
    if (typeof scopeOverride === 'string') {
      scope = scopeOverride;
    } else if (detailPath.length > 0) {
      scope = detailPath.join('/');
    } else {
      scope = '';
    }

    var overlay = document.getElementById('graph-overlay');
    overlay.classList.add('visible');

    // Update scope indicator
    updateGraphScope(scope);

    if (graphCache[scope]) {
      startGraph(graphCache[scope]);
      return;
    }

    var progress = document.getElementById('graph-progress');
    progress.style.display = '';
    var progressText = document.getElementById('graph-progress-text');

    try {
      var graph = await buildGraph(
        function (msg) { progressText.textContent = msg; },
        scope || undefined
      );
      graphCache[scope] = graph;
      progress.style.display = 'none';
      startGraph(graph);
    } catch (err) {
      progress.style.display = 'none';
      showError('Graph build failed: ' + err.message);
    }
  }

  /** Update the scope indicator in the graph toolbar. */
  function updateGraphScope(scope) {
    var indicator = document.getElementById('graph-scope');
    if (!indicator) return;
    if (scope) {
      indicator.innerHTML = '';
      indicator.appendChild(el('span', '\uD83D\uDCC1 ' + scope));
      var allBtn = el('a', 'show all');
      allBtn.style.marginLeft = '0.5rem';
      allBtn.style.cursor = 'pointer';
      allBtn.addEventListener('click', function () {
        if (graphSim) { graphSim.stop(); graphSim = null; }
        openGraph('');
      });
      indicator.appendChild(allBtn);
      indicator.style.display = '';
    } else {
      indicator.style.display = 'none';
    }
  }

  // Wire up open/close
  document.getElementById('graph-open-btn').addEventListener('click', function () {
    if (!rootHandle) {
      showError('No memory repo loaded. Please open the dashboard first.');
      return;
    }
    openGraph();
  });
  document.getElementById('graph-close-btn').addEventListener('click', function () {
    document.getElementById('graph-overlay').classList.remove('visible');
    document.getElementById('graph-preview').classList.remove('visible');
    if (graphSim) { graphSim.stop(); graphSim = null; }
  });

  /* ── initialization ────────────────────────────────── */

  (async function init() {
    if (!window.showDirectoryPicker) {
      var ph = document.getElementById('placeholder');
      ph.textContent = '';
      ph.appendChild(el('div', '\u26A0', 'icon'));
      var p1 = el('p');
      p1.appendChild(el('strong', 'Browser not supported.'));
      p1.appendChild(document.createTextNode(' The File System Access API is required.'));
      var p2 = el('p', 'Please open this page in Chrome, Edge, Brave, or Arc.');
      p2.style.marginTop = '0.5rem';
      ph.appendChild(p1);
      ph.appendChild(p2);
      return;
    }

    var saved = await loadSavedHandle();
    if (!saved) {
      showError('No memory repo loaded. Please open the dashboard first and load your repo folder.');
      return;
    }

    try {
      var perm = await saved.requestPermission({ mode: 'read' });
      if (perm !== 'granted') {
        showError('Permission denied. Please open the dashboard and re-open your repo folder.');
        return;
      }
    } catch (_) {
      showError('Could not restore repo handle. Please open the dashboard and re-open your repo folder.');
      return;
    }

    rootHandle = saved;

    // Check for ?domain= query parameter
    var params = new URLSearchParams(window.location.search);
    var domain = params.get('domain');

    if (domain) {
      openDomain(domain);
    } else {
      await loadDomainPicker();
    }
  })();

})();
</script>
</body>
</html>
