id: context-injectors
project: context-injectors
created: '2026-03-28'
origin_session: memory/activity/2026/03/28/chat-001
status: draft
sessions_used: 0
budget:
  deadline: '2026-04-15'
  max_sessions: 6
  advisory: true
purpose:
  summary: >
    Implement memory_context_home and memory_context_project — two Tier 0
    read-only MCP tools that replace the file-based INIT.md routing for the
    most common session patterns, giving any agent a single-call context
    surface optimized for token efficiency.
  context: >
    Engram's current bootstrap relies on agents reading core/INIT.md, following
    its routing table to HOME.md, then sequentially loading SUMMARY files. This
    works but requires the agent to understand the routing protocol, make
    multiple file reads, and manually manage its context budget. The
    optimization pressures on INIT.md have made it more a part of the system's
    form than its content.

    Context injectors formalize the two most predictable loading patterns as
    single MCP calls that return Markdown content with a JSON metadata header.
    They use soft token budgets (drop lower-priority sections, never truncate
    mid-file) and include a budget_report so the agent knows what was included,
    what was dropped, and what it can request separately.

    These tools are the highest-leverage adoption improvement identified in the
    strategic analysis (2026-03-28): they reduce the barrier from "understand
    Engram's routing protocol" to "call one tool."

    Design constraints:
    - Tier 0 read-only, side-effect-free (no ACCESS logging from the tool itself)
    - Return format: Markdown body with JSON metadata header
    - Soft budgets: drop whole sections by priority, never truncate mid-file
    - budget_report field shows what was loaded, dropped, and why
    - Consistent with existing max_context_chars convention (character-based)
    - Must degrade gracefully when files are missing or contain only templates
  questions:
    - Should the metadata header be JSON or YAML? (JSON matches session_bootstrap precedent)
    - Should we log ACCESS entries for files loaded via context injectors?
    - How should we detect placeholder/template content to skip?

work:
  phases:
    # ── Phase 1: Shared infrastructure ────────────────────────────────
    - id: context-assembly-helpers
      title: Build shared context assembly helpers
      status: pending
      blockers: []
      requires_approval: false
      sources:
        - path: core/tools/agent_memory_mcp/tools/read_tools/_helpers.py
          type: internal
          intent: >
            Understand existing helpers (_truncate_items, _load_content_files,
            _parse_aggregation_trigger) and the registration pattern. New helpers
            must follow the same H.* export convention.
        - path: core/tools/agent_memory_mcp/plan_utils.py
          type: internal
          intent: >
            Reuse _truncate_briefing_text for soft budget truncation of individual
            sections. Understand the max_context_chars convention.
        - path: core/memory/HOME.md
          type: internal
          intent: >
            The canonical loading order that memory_context_home must replicate.
            Priority ordering derives from this file's sequence.
      postconditions:
        - type: check
          description: >
            A new _context.py helper module exists at
            core/tools/agent_memory_mcp/tools/read_tools/_context.py
        - type: check
          description: >
            Module exports: _read_file_content, _read_section_with_budget,
            _build_budget_report, _is_placeholder, _assemble_markdown_response
        - type: test
          command: pytest core/tools/tests/ -k context_helper
          description: >
            Helper unit tests pass: _is_placeholder detects template markers,
            _read_section_with_budget respects char limits and returns truncated=false
            when content fits, _build_budget_report correctly reports included/dropped
            sections, _assemble_markdown_response produces valid metadata+markdown
      changes:
        - path: core/tools/agent_memory_mcp/tools/read_tools/_context.py
          action: create
          description: >
            Shared context assembly module with:

            _read_file_content(root, repo_relative_path) -> str | None
              Read a file, return content or None if missing. Strip YAML frontmatter
              for cleaner context injection (the metadata header carries provenance
              separately).

            _is_placeholder(content: str) -> bool
              Detect template/placeholder content. Heuristics: contains
              "{{PLACEHOLDER}}" or "[TEMPLATE]" markers, or file body (after
              frontmatter) is shorter than 50 characters and contains only a heading.

            _read_section_with_budget(root, path, remaining_chars) -> tuple[str | None, int]
              Read a file if it fits within remaining_chars. Returns (content, chars_used)
              or (None, 0) if content exceeds budget or is placeholder. Never truncates
              mid-file — that is the soft budget contract.

            _build_budget_report(sections: list[dict]) -> dict
              Takes a list of {name, path, chars, included, reason} dicts and returns
              a structured report: total_chars, sections_included, sections_dropped,
              and per-section detail.

            _assemble_markdown_response(metadata: dict, sections: list[tuple[str, str]]) -> str
              Combines a JSON metadata header (```json block) with named markdown
              sections (## headers) into the final response string.

        - path: core/tools/tests/test_context_helpers.py
          action: create
          description: >
            Unit tests for the context assembly helpers. Test cases:
            - _is_placeholder: true for template stubs, false for real content
            - _read_section_with_budget: respects budget, returns None when over
            - _read_section_with_budget: returns None for missing files
            - _build_budget_report: correct totals, correct included/dropped lists
            - _assemble_markdown_response: valid output format, metadata parseable

    # ── Phase 2: memory_context_home ──────────────────────────────────
    - id: context-home-tool
      title: Implement memory_context_home tool
      status: pending
      blockers:
        - context-assembly-helpers
      requires_approval: true
      sources:
        - path: core/memory/HOME.md
          type: internal
          intent: >
            Canonical loading order. The tool replicates this sequence:
            1. users/SUMMARY.md (user portrait)
            2. activity/SUMMARY.md (recent continuity)
            3. working/USER.md (user-authored priorities)
            4. working/CURRENT.md (agent working notes)
            Then conditionally:
            5. working/projects/SUMMARY.md (project index)
            6. knowledge/SUMMARY.md (knowledge index)
            7. skills/SUMMARY.md (skills index)
        - path: core/tools/agent_memory_mcp/tools/read_tools/_health.py
          type: internal
          intent: >
            Reference memory_session_bootstrap for the registration pattern
            and how it integrates with the _health submodule. The new tool
            should be registered in the same submodule.
      postconditions:
        - type: grep
          pattern: "memory_context_home"
          path: core/tools/agent_memory_mcp/tools/read_tools/_health.py
          description: Tool is registered in the health submodule
        - type: test
          command: pytest core/tools/tests/ -k context_home
          description: >
            Integration tests pass: returns valid markdown+metadata, respects
            max_context_chars budget, drops lower-priority sections first,
            skips placeholder files, includes budget_report in metadata
      changes:
        - path: core/tools/agent_memory_mcp/tools/read_tools/_health.py
          action: modify
          description: >
            Register memory_context_home in the health submodule. Tool signature:

            async def memory_context_home(
                max_context_chars: int = 16000,
                include_project_index: bool = True,
                include_knowledge_index: bool = False,
                include_skills_index: bool = False,
            ) -> str

            Implementation:
            1. Define section priority list (ordered by loading importance):
               - P0 (always): users/SUMMARY.md
               - P1 (always): activity/SUMMARY.md
               - P2 (always): working/USER.md
               - P3 (always): working/CURRENT.md
               - P4 (if include_project_index): working/projects/SUMMARY.md
               - P5 (if include_knowledge_index): knowledge/SUMMARY.md
               - P6 (if include_skills_index): skills/SUMMARY.md
            2. Iterate sections in priority order. For each, call
               _read_section_with_budget. If it returns content, add to output
               and subtract from remaining budget. If None (over budget or
               placeholder), record as dropped in the budget report.
            3. Build metadata header: {tool: "memory_context_home", loaded_files,
               budget_report, top_of_mind (from HOME.md ## Top of mind section)}.
            4. Assemble and return via _assemble_markdown_response.

            Annotations: readOnlyHint=True, destructiveHint=False,
            idempotentHint=True, openWorldHint=False.

            Description (for MCP tool listing):
            "Load general-purpose session context in a single call. Returns the
            user profile, recent activity, working state, and optionally the
            project/knowledge/skills indexes — the same content the HOME.md
            manifest prescribes, assembled within a character budget."

        - path: core/tools/tests/test_context_home.py
          action: create
          description: >
            Integration tests for memory_context_home:
            - Full load: all sections present, metadata includes all file paths
            - Budget pressure: small max_context_chars drops lower-priority sections
            - Placeholder skip: USER.md with template content is omitted
            - Include flags: include_knowledge_index=True adds knowledge/SUMMARY.md
            - Missing files: graceful degradation when a SUMMARY.md doesn't exist
            - Budget report: sections_included and sections_dropped are correct
            - Top of mind: extracted from HOME.md and included in metadata

    # ── Phase 3: memory_context_project ───────────────────────────────
    - id: context-project-tool
      title: Implement memory_context_project tool
      status: pending
      blockers:
        - context-assembly-helpers
      requires_approval: true
      sources:
        - path: core/memory/working/projects/harness-expansion/SUMMARY.md
          type: internal
          intent: >
            Reference project SUMMARY.md format to understand what the tool
            should extract: project metadata, phase summaries, status.
        - path: core/memory/working/projects/harness-expansion/plans/run-state-phase-10.yaml
          type: internal
          intent: >
            Reference plan YAML format. The tool needs to find the active plan,
            extract the current phase's purpose/sources/postconditions/blockers.
        - path: core/tools/agent_memory_mcp/plan_utils.py
          type: internal
          intent: >
            Reuse load_plan, phase_payload, next_action, and the
            _truncate_briefing_text helper. Also understand how
            assemble_briefing_packet works for plan content assembly.
        - path: core/tools/agent_memory_mcp/tools/semantic/plan_tools.py
          type: internal
          intent: >
            Reference memory_plan_briefing for how plan context is already
            assembled. memory_context_project wraps this with project-level
            context (SUMMARY, IN/ contents, user profile).
      postconditions:
        - type: grep
          pattern: "memory_context_project"
          path: core/tools/agent_memory_mcp/tools/read_tools/_health.py
          description: Tool is registered in the health submodule
        - type: test
          command: pytest core/tools/tests/ -k context_project
          description: >
            Integration tests pass: returns valid markdown+metadata for a named
            project, includes plan state, respects budget, skips missing projects
            gracefully, includes user profile when requested
      changes:
        - path: core/tools/agent_memory_mcp/tools/read_tools/_health.py
          action: modify
          description: >
            Register memory_context_project in the health submodule. Tool signature:

            async def memory_context_project(
                project: str,
                max_context_chars: int = 24000,
                include_plan_sources: bool = True,
                include_user_profile: bool = True,
            ) -> str

            Implementation:
            1. Validate project exists: check working/projects/{project}/ is a directory.
               Raise ValidationError with available project names if not found.
            2. Define section priority list:
               - P0 (if include_user_profile): users/SUMMARY.md (compact portrait)
               - P1 (always): working/projects/{project}/SUMMARY.md
               - P2 (always): active plan state. Find the active plan YAML in
                 {project}/plans/. If found, extract: purpose.summary,
                 purpose.context, current phase (first pending/in-progress),
                 phase blockers, postconditions, and next_action. Use
                 plan_utils helpers where possible.
               - P3 (if include_plan_sources and active plan has sources):
                 Read current phase's source files within remaining budget.
                 Sources are read in declaration order; each is a whole-file-
                 or-nothing inclusion.
               - P4 (always): IN/ staging area listing. List files in
                 {project}/IN/ with their frontmatter metadata (trust, source,
                 created). Content is NOT loaded — just the manifest.
               - P5 (conditional): working/CURRENT.md if it references this
                 project (lightweight check: grep for project name).
            3. Build metadata header: {tool: "memory_context_project",
               project, active_plan_id, active_phase_id, loaded_files,
               budget_report}.
            4. Assemble and return via _assemble_markdown_response.

            Annotations: readOnlyHint=True, destructiveHint=False,
            idempotentHint=True, openWorldHint=False.

            Description (for MCP tool listing):
            "Load project-focused work context in a single call. Returns the
            project summary, active plan state with current phase details,
            optionally the phase's source files and user profile — optimized
            for automation agents resuming work on a specific project."

        - path: core/tools/tests/test_context_project.py
          action: create
          description: >
            Integration tests for memory_context_project:
            - Valid project: returns summary + plan state + metadata
            - Unknown project: raises ValidationError listing available projects
            - No active plan: graceful degradation, plan section says "no active plan"
            - Plan sources: include_plan_sources=True loads source files in budget
            - Budget pressure: large plan sources are dropped before project summary
            - User profile: include_user_profile=False omits users/SUMMARY.md
            - IN/ listing: shows staged files with metadata, not content
            - CURRENT.md relevance: included only when it mentions the project

    # ── Phase 4: Registration, capabilities, and documentation ────────
    - id: registration-and-docs
      title: Register tools, update capabilities manifest, document the new surface
      status: pending
      blockers:
        - context-home-tool
        - context-project-tool
      requires_approval: true
      sources:
        - path: HUMANS/tooling/agent-memory-capabilities.toml
          type: internal
          intent: >
            Add both tools to the Tier 0 read_support section of the
            capabilities manifest. Follow existing entry format.
        - path: core/tools/agent_memory_mcp/tools/read_tools/__init__.py
          type: internal
          intent: >
            Wire the new _context submodule into the registration chain via
            register_context().
        - path: HUMANS/docs/MCP.md
          type: internal
          intent: Update MCP docs to describe the context injector family.
        - path: README.md
          type: internal
          intent: >
            Consider whether the agent bootstrap section should mention
            memory_context_home as the preferred MCP-based entry point.
      postconditions:
        - type: grep
          pattern: "memory_context_home"
          path: HUMANS/tooling/agent-memory-capabilities.toml
          description: Tool appears in capabilities manifest
        - type: grep
          pattern: "memory_context_project"
          path: HUMANS/tooling/agent-memory-capabilities.toml
          description: Tool appears in capabilities manifest
        - type: grep
          pattern: "register_context"
          path: core/tools/agent_memory_mcp/tools/read_tools/__init__.py
          description: Context submodule is wired into registration chain
        - type: test
          command: pytest core/tools/tests/ -k "context_home or context_project or context_helper"
          description: Full test suite passes
        - type: manual
          description: >
            MCP.md mentions both tools with parameter docs. README.md agent
            bootstrap section mentions memory_context_home as the preferred
            MCP-based alternative to file-based routing.
      changes:
        - path: core/tools/agent_memory_mcp/tools/read_tools/__init__.py
          action: modify
          description: >
            Import and call register_context(mcp, get_repo, get_root, H)
            in the register() function, after register_health. Add result
            to the tools dict.
        - path: HUMANS/tooling/agent-memory-capabilities.toml
          action: modify
          description: >
            Add memory_context_home and memory_context_project to the
            [tools.read_support] section. Both: tier=0, approval="automatic",
            cost_tier="low", idempotent=true, read_only=true.
        - path: HUMANS/docs/MCP.md
          action: modify
          description: >
            Add a "Context injectors" section describing the tool family,
            their parameters, return format, and when to use each.
            Include the roadmap note that memory_context_query and
            memory_context_resume are planned for later stages.
        - path: README.md
          action: modify
          description: >
            In the "Agent routing" section, add a note:
            "When the MCP surface is available, prefer memory_context_home
            (for general sessions) or memory_context_project (for project-
            focused automation) as single-call alternatives to the file-based
            routing manifests."
        - path: CHANGELOG.md
          action: modify
          description: >
            Add entry: "Context injectors: memory_context_home and
            memory_context_project — single-call Tier 0 tools that replace
            file-based routing for the two most common session patterns.
            Returns Markdown with JSON metadata header within a soft
            character budget."

review: null
