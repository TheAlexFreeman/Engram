    - description: Falls back to keyword mode when sentence-transformers not installed
    - description: engram search --json outputs structured JSON results
    - description: Tests cover keyword mode, semantic mode, fallback, and --scope
      type: test
      target: core/tools/tests/test_cli_search.py
    changes:
    - path: core/tools/agent_memory_mcp/cli/cmd_search.py
      action: create
      description: 'Search subcommand. register_search(subparsers). run_search(args, repo_root)
        tries to import sentence_transformers; if available and --keyword not forced, uses
        semantic search; otherwise falls back to keyword grep. Prints mode banner. Each result:
        relative path, trust level from frontmatter, matching snippet, similarity score (semantic
        only). --json emits array of result objects.'
    - path: core/tools/tests/test_cli_search.py
      action: create
      description: 'Tests: keyword search finds known content, --scope limits results, --json
        output is valid, fallback prints mode banner, --limit caps results.'
