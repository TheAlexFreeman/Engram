{% load django_vite initial_server_data_provided_for_web static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link rel="apple-touch-icon"
              sizes="180x180"
              href="{% static 'apple-touch-icon.png' %}" />
        <link rel="icon"
              type="image/png"
              sizes="32x32"
              href="{% static 'favicon-32x32.png' %}" />
        <link rel="icon"
              type="image/png"
              sizes="16x16"
              href="{% static 'favicon-16x16.png' %}" />
        <link rel="manifest" href="{% static 'site.webmanifest' %}" />
        <link rel="mask-icon"
              color="#5bbad5"
              href="{% static 'safari-pinned-tab.svg' %}" />
        <meta name="msapplication-TileColor" content="#da532c">
        <meta name="theme-color" content="#4e49d1">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        {% initial_server_data_provided_for_web %}
        {% vite_hmr_client %}
        {% vite_react_refresh %}
        {% vite_asset 'frontend/main.tsx' %}
        <title>Better Base</title>
    </head>
    <body>
        <div id="root"></div>
    </body>
</html>
