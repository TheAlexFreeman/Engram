  - id: fork-and-rebrand
    title: Fork Better Base and strip all Better Base branding
    status: pending
    commit: null
    blockers: []
    postconditions:
    - description: No remaining occurrences of 'Better Base' in source (outside of CHANGELOG/history)
      type: grep
      target: (?i)better\s*base::(README.md|AGENTS.md|config|backend|frontend)
    - description: 'Manual: logo SVGs visually match Rate My Set brand'
    changes:
