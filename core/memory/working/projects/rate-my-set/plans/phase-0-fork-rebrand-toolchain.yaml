    title: Validate local toolchain against forked repo
    status: pending
    commit: null
    blockers: []
    postconditions:
    - description: 'Manual: task build produces Docker images cleanly'
    - description: 'Manual: uv sync resolves Python 3.14+ venv'
    - description: 'Manual: task back brings up Postgres, Redis, Mailpit'
    - description: 'Manual: python manage.py migrate applies cleanly'
    - description: 'Manual: bun install && bun dev serves frontend at :4020'
    - description: 'Manual: task tcovdb passes existing test suite'
    - description: 'Manual: task mp reports mypy clean'
    - description: 'Manual: bun run lint && bun run tscheck are clean'
    changes:
    - path: .
      action: update
      description: "No code changes in this phase \u2014 verify task build, uv sync, task\
