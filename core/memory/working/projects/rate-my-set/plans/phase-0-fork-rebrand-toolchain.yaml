status: active
purpose:
  summary: "Fork Better Base, rebrand to Rate My Set, validate toolchain, and commit the account-model\
    \ mapping decision \u2014 reach a green-CI starting point with no Better Base marketing\
    \ copy remaining."
  context: "Phase 0 of better-base-roadmap.md is the only phase with no dependency on unresolved\
    \ v1 design questions, and it blocks every subsequent build phase. Goal: a running local\
    \ dev environment with Rate My Set branding and passing CI. The account-model mapping\
    \ decision (Option A lightweight vs Option B heavier multi-tenant) is included because\
    \ it must be resolved before Phase 1 domain models can be written \u2014 Option A is currently\
    \ recommended in the roadmap."
  questions: []
work:
