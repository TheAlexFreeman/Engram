      action: update
      description: Replace invitation email headline copy.
    - path: README.md
      action: rewrite
      description: Replace cookiecutter boilerplate with Rate My Set project README.
    - path: AGENTS.md
      action: update
      description: Update project context to Rate My Set.
    - path: backend/templates
      action: update
      description: Rebrand all email templates under backend/templates/ and emails/.
    - path: frontend/components/logos
      action: update
      description: Replace Better Base logo SVGs with Rate My Set logos.
