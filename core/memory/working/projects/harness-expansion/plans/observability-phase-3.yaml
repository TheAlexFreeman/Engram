        as instrumentation targets.
    - path: core/memory/working/projects/harness-expansion/IN/phase-3-observability-design.md
      type: internal
      intent: Follow the finalized design for memory_record_trace parameters and return schema.
    - path: core/tools/agent_memory_mcp/errors.py
      type: internal
      intent: Ensure trace recording failures are caught, not propagated (non-blocking contract).
    postconditions:
    - description: memory_record_trace tool registered in MCP server
      type: grep
      target: memory_record_trace::core/tools/agent_memory_mcp/tools/semantic/plan_tools.py
    - description: Internal record_trace() helper function exists for server-side instrumentation
    - description: Trace file created at correct path (activity/YYYY/MM/DD/chat-NNN.traces.jsonl)
    - description: 'Trace recording is non-blocking: exceptions caught and logged'
    - description: pre-commit hooks pass
