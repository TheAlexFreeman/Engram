id: observability-phase-3
project: harness-expansion
created: '2026-03-26'
origin_session: memory/activity/2026/03/26/chat-002
status: draft
sessions_used: 0
budget:
  deadline: '2026-05-15'
  max_sessions: 8
  advisory: true
purpose:
  summary: >-
    Add structured trace recording, querying, and visualization so agents
    and humans can see what happened during a session.
  context: |
    The harness report calls observability "the biggest operational gap":
    you cannot manage what you cannot see. Engram has git history, session
    summaries, and ACCESS.jsonl (designed for retrieval tracking but currently
    empty) — but no structured tool-call traces with timing, cost, or outcome.

    This phase adds: (1) a TRACES.jsonl span schema, (2) a recording tool that
    plan actions and retrieval operations use to emit spans, (3) an ACCESS.jsonl
    extension for tool-call events, (4) a query tool for filtering and aggregating
    traces, (5) session summary enrichment with trace-derived metrics, and (6)
    a trace viewer UI.

    Design document: IN/phase-3-observability-design.md
  questions:
    - Should trace recording be opt-in per session or always-on?
    - How much metadata should be included in spans (balance detail vs size)?
    - Should the trace viewer read files directly or go through MCP tools?
    - What retention policy should apply to trace files?
work:
  phases:
    # ── Trace schema and recording ──────────────────────────────────────

    - id: trace-schema-design
      title: Finalize TRACES.jsonl span schema and storage conventions
      status: pending
      blockers: []
      requires_approval: true
      sources:
        - path: core/memory/working/projects/harness-expansion/IN/phase-3-observability-design.md
          type: internal
          intent: >-
            Reference the full trace schema design: span fields, span types,
            storage location, behavioral contract.
        - path: core/memory/working/notes/harness-expansion-analysis.md
          type: internal
          intent: >-
            Ground the schema in the gap analysis recommendations for
            evaluation and observability.
        - path: core/memory/activity/ACCESS.jsonl
          type: internal
          intent: >-
            Understand the existing ACCESS.jsonl format to ensure the trace
            schema is compatible and complementary.
      postconditions:
        - description: >-
            Trace span schema finalized in IN/phase-3-observability-design.md
            with all field definitions, span types, and examples
          type: manual
        - description: >-
            Storage convention decided: per-session TRACES.jsonl alongside
            session summaries
          type: manual
        - description: >-
            Retention policy defined (e.g., traces follow session summary lifecycle)
          type: manual
      changes:
        - path: core/memory/working/projects/harness-expansion/IN/phase-3-observability-design.md
          action: update
          description: >-
            Finalize schema decisions: span ID format, metadata sanitization rules,
            retention policy, opt-in vs always-on. Record rationale.

