            instrumentation
          type: manual
        - description: >-
            Trace file created at correct path
            (activity/YYYY/MM/DD/chat-NNN.traces.jsonl)
          type: manual
        - description: >-
            Trace recording is non-blocking: exceptions caught and logged
          type: manual
        - description: pre-commit hooks pass
          type: test
          target: pre-commit run --all-files
      changes:
        - path: core/tools/agent_memory_mcp/tools/semantic/plan_tools.py
