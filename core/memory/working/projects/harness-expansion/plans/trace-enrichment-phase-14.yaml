id: trace-enrichment-phase-14
project: harness-expansion
created: '2026-03-27'
origin_session: memory/activity/2026/03/27/chat-002
status: draft
sessions_used: 0
budget:
  deadline: '2026-06-01'
  max_sessions: 5
  advisory: true
purpose:
  summary: Enrich the Phase 3 observability layer with cost tracking, parent-child
    span trees, trace-derived dashboards, and integration with the guard pipeline
    and policy enforcement traces.
  context: >
    Phase 3 delivered structured traces with TraceSpan, TRACES.jsonl, recording,
    and querying. However, several fields are defined but not populated (cost),
    parent-child relationships are supported in schema but not actively used, and
    the trace viewer is a standalone HTML page without aggregate dashboards.

    The deep research report recommends "end-to-end traces across model calls,
    tool calls, retrieval, and guardrails" with "standard telemetry format" and
    attributes latency/cost as critical operational metrics.

    This phase fills in the observability gaps: (1) populate cost fields on trace
    spans, (2) instrument parent-child span relationships for call-tree
    reconstruction, (3) add aggregate metrics to the trace query tool, (4) build
    a session-level dashboard view, and (5) integrate traces from Phases 11
    (policy violations) and 12 (guardrail checks).

    Dependencies: Phase 3 (traces), Phase 11 (policy violation spans), Phase 12
    (guardrail_check spans). Can start on items 1-3 immediately.
  questions:
  - How should cost be estimated when actual LLM costs aren't available?
  - Should the dashboard be a new HTML view or an extension of traces.html?
  - What aggregate metrics are most useful for the periodic review workflow?
work:
  phases:
  - id: cost-tracking-impl
    title: Populate cost fields on trace spans
    status: pending
    blockers: []
    sources:
    - path: core/tools/agent_memory_mcp/plan_utils.py
      type: internal
      intent: Find TraceSpan.cost field and all record_trace() call sites to add
        cost estimation.
    - path: core/tools/agent_memory_mcp/tools/semantic/plan_tools.py
      type: internal
      intent: Identify tool execution sites where cost can be estimated (character
        counts as proxy for token costs).
    postconditions:
    - description: record_trace() call sites pass cost estimates based on input/output size
      type: manual
    - description: Cost estimation uses character count as token proxy with configurable
        multiplier
      type: manual
    - description: memory_query_traces aggregates include total_cost
      type: manual
    - description: pre-commit hooks pass
      type: test
      target: pre-commit run --all-files
    changes:
    - path: core/tools/agent_memory_mcp/tools/semantic/plan_tools.py
      action: update
      description: Add cost estimation to all record_trace() call sites.

  - id: parent-child-spans
