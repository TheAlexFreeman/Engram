purpose:
  summary: Add cross-phase integration tests that validate subsystem composition across
    all five harness extensions.
  context: >
    Phases 1–5 each shipped with unit tests scoped to their own subsystem,
    but no test validates cross-cutting paths where multiple subsystems
    interact: approval → trace → verify, failure → retry → tool-policy,
    full lifecycle with all subsystems active.

    The deep research report warns about "emergent failure modes" in coupled
    systems. This phase closes that gap with 30-40 integration tests that
    exercise realistic multi-subsystem scenarios.

    Design document: IN/phase-6-integration-tests-design.md

    Dependencies: None — all five phases are complete and testable.
  questions:
  - Should integration tests live in test_plan_schema_extensions.py or a separate file?
  - How should the approval directory fixture handle concurrent test isolation?
  - Should integration tests run as part of the standard pytest suite or behind a marker?
