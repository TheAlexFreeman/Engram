  advisory: true
purpose:
  summary: Add a tool definition registry so Engram can store and query policies for external
    tools without executing them.
  context: "The harness report recommends treating tools as an API product: clear\nschemas,\
    \ compact outputs, namespacing. Engram's 73 MCP tools are\nwell-designed for memory operations,\
    \ but agents also use external tools\n(shell commands, APIs, code execution) that Engram\
    \ knows nothing about.\n\nThis phase adds policy storage for external tools: a YAML-based\
    \ registry\nin skills/tool-registry/ with tools to register definitions and query\npolicies.\
    \ Engram does not execute these tools \u2014 it stores metadata so\nagents and orchestrators\
    \ can respect constraints (approval requirements,\ncost tiers, rate limits, timeouts).\n\
    \nDesign document: IN/phase-4-tool-registry-design.md\n"
  questions:
  - Should the registry store one file per tool or group by provider?
  - Should tool registration require human approval?
  - How should registered tools compose with plan postconditions of type test?
  - Should there be a built-in set of default tool definitions for common commands?
