id: tool-registry-phase-4
project: harness-expansion
created: '2026-03-26'
origin_session: memory/activity/2026/03/26/chat-002
status: draft
sessions_used: 0
budget:
  deadline: '2026-05-31'
  max_sessions: 5
  advisory: true
purpose:
  summary: >-
    Add a tool definition registry so Engram can store and query policies
    for external tools without executing them.
  context: |
    The harness report recommends treating tools as an API product: clear
    schemas, compact outputs, namespacing. Engram's 73 MCP tools are
    well-designed for memory operations, but agents also use external tools
    (shell commands, APIs, code execution) that Engram knows nothing about.

    This phase adds policy storage for external tools: a YAML-based registry
    in skills/tool-registry/ with tools to register definitions and query
    policies. Engram does not execute these tools — it stores metadata so
    agents and orchestrators can respect constraints (approval requirements,
    cost tiers, rate limits, timeouts).

    Design document: IN/phase-4-tool-registry-design.md
  questions:
    - Should the registry store one file per tool or group by provider?
    - Should tool registration require human approval?
    - How should registered tools compose with plan postconditions of type test?
    - Should there be a built-in set of default tool definitions for common commands?
work:
  phases:
    # ── Registry schema and storage ─────────────────────────────────────

    - id: registry-schema-design
      title: Finalize ToolDefinition schema and storage conventions
      status: pending
      blockers: []
      requires_approval: true
      sources:
        - path: core/memory/working/projects/harness-expansion/IN/phase-4-tool-registry-design.md
          type: internal
          intent: >-
            Reference the full design: ToolDefinition fields, cost tiers,
            storage location rationale, validation rules.
        - path: core/memory/working/notes/harness-expansion-analysis.md
          type: internal
          intent: >-
            Ground the design in the gap analysis recommendations for tool
            interface and policy management.
        - path: core/memory/skills/SUMMARY.md
          type: internal
          intent: >-
            Understand existing skills/ structure to place tool-registry/
            appropriately.
      postconditions:
        - description: >-
            ToolDefinition schema finalized in IN/phase-4-tool-registry-design.md
            with all field definitions, validation rules, and examples
          type: manual
        - description: >-
            Storage decision recorded: grouped by provider in YAML files
            under skills/tool-registry/
          type: manual
        - description: >-
            Decision on default tool definitions for common commands
            (pre-commit, pytest, ruff) recorded
          type: manual
      changes:
        - path: core/memory/working/projects/harness-expansion/IN/phase-4-tool-registry-design.md
          action: update
          description: >-
            Finalize schema decisions: provider grouping, default tools,
            registration approval requirements. Record rationale.

    - id: registry-storage-impl
      title: Implement YAML-based tool registry storage with validation
      status: pending
      blockers:
        - registry-schema-design
      sources:
        - path: core/tools/agent_memory_mcp/plan_utils.py
          type: internal
          intent: >-
            Follow existing dataclass and YAML serialization patterns
            (to_dict, load/save, validation) for consistency.
        - path: core/memory/working/projects/harness-expansion/IN/phase-4-tool-registry-design.md
          type: internal
          intent: >-
            Follow the finalized ToolDefinition schema for implementation.
        - path: core/tools/agent_memory_mcp/path_policy.py
          type: internal
          intent: >-
            Understand path policy to ensure skills/tool-registry/ is
            writable by the MCP server.
      postconditions:
        - description: ToolDefinition dataclass exists with all specified fields
          type: grep
          target: "class ToolDefinition::core/tools/agent_memory_mcp/plan_utils.py"
        - description: >-
            load_registry() and save_registry() functions handle YAML
            round-trip for provider files
          type: manual
        - description: >-
            Validation enforces slug names, valid cost tiers, timeout >= 1
          type: manual
        - description: >-
            skills/tool-registry/ directory created with SUMMARY.md
          type: check
          target: core/memory/skills/tool-registry/SUMMARY.md
        - description: pre-commit hooks pass
          type: test
          target: pre-commit run --all-files
      changes:
        - path: core/tools/agent_memory_mcp/plan_utils.py
          action: update
          description: >-
            Add ToolDefinition dataclass, COST_TIERS set, load_registry()
            and save_registry() helpers. Add validation for all fields.
        - path: core/memory/skills/tool-registry/SUMMARY.md
          action: create
          description: >-
            Create registry navigator with instructions and empty tool list.

    # ── MCP tools ───────────────────────────────────────────────────────

