purpose:
  summary: Add a structured approval workflow with pause/resume, persistent approval documents,
    and a human-facing approval UI.
  context: 'The harness report emphasizes: "Operationalize HITL as an interrupt/resume

    mechanism with serialized run state." Phase 1 added requires_approval as a

    flag, but there''s no structured workflow: no way to create a pending approval

    request, serialize the context, pause the plan, or resume after resolution.


    This phase closes the loop by adding: (1) an approval document schema and

    storage in working/approvals/, (2) MCP tools for requesting and resolving

    approvals, (3) a paused plan status with automatic pause on requires_approval

    phases, (4) approval expiry, and (5) an approval UI for humans.


    Design document: IN/phase-5-hitl-design.md


    Dependencies: Phase 2 verification (verify postconditions before requesting

    approval) and Phase 3 trace recording (emit traces for approval actions).

    '
  questions:
  - Should approval auto-create when starting a requires_approval phase, or require explicit
    request?
  - What should the default expiry period be?
  - Should rejected approvals allow re-request or require plan modification?
  - How should the approval UI interact with the MCP server (direct file write vs API)?
