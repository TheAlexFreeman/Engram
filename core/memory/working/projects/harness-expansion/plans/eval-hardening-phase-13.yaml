        isolation points.
    - path: core/tools/agent_memory_mcp/git_repo.py
      type: internal
      intent: Understand git operations for potential worktree-based isolation.
    postconditions:
    - description: Isolation strategy decided (worktree vs tmpdir) with rationale
      type: manual
    - description: Cleanup contract documented (what happens to worktree after eval)
      type: manual
    - description: Regression detection thresholds defined
      type: manual
    changes:
    - path: core/memory/working/projects/harness-expansion/IN/phase-13-eval-hardening-design.md
