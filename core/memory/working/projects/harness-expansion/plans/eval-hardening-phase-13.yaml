id: eval-hardening-phase-13
project: harness-expansion
created: '2026-03-27'
origin_session: memory/activity/2026/03/27/chat-002
status: draft
sessions_used: 0
budget:
  deadline: '2026-06-15'
  max_sessions: 6
  advisory: true
purpose:
  summary: Harden the Phase 7 eval framework with isolated execution environments,
    CI integration, regression detection, and expanded scenario coverage for
    Phases 10-12.
  context: >
    Phase 7 delivered the eval schema, dataclasses, runner, metrics, and MCP tools.
    The deep research report stresses that "eval value compounds over the lifecycle"
    and recommends "private eval sets and telemetry-derived tasks" to guard against
    benchmark contamination and subtle regressions.

    The current eval runner (run_scenario / run_suite in eval_utils.py) executes
    scenarios directly against the memory repo. This means evals can leave artifacts,
    and there is no isolation between scenarios. There is also no CI integration,
    no regression detection across runs, and the seed scenarios cover only the
    Phase 1-9 feature set.

    This phase adds: (1) isolated eval execution via temporary git worktrees,
    (2) a pytest integration for CI pipelines, (3) result history with trend
    tracking, (4) regression detection comparing consecutive runs, and (5) new
    eval scenarios for Phases 10-12 features.

    Dependencies: Phase 7 (eval framework), Phase 10 (run state scenarios),
    Phase 11 (policy enforcement scenarios), Phase 12 (guardrail scenarios).
    Phase 10-12 scenario writing can start before those phases complete, using
    the plan schema as specification.
  questions:
  - Should eval isolation use git worktrees or tmpdir copies of the repo?
  - What regression threshold triggers a warning vs a failure?
  - Should eval history persist in git or in a separate tracking file?
  - How should eval results integrate with the trace viewer UI?
work:
