status: active
sessions_used: 1
budget:
  deadline: '2026-06-01'
  max_sessions: 8
  advisory: true
purpose:
  summary: Make tool policies enforceable at runtime by adding a policy-check middleware
    that gates write operations based on the tool registry's approval, cost, and rate
    limit metadata.
  context: >
    Phase 4 built a tool registry with ToolDefinition storing approval_required,
    cost_tier, and rate limits — but these are informational metadata, not enforced
    policies. The deep research report emphasizes: "enforce a tool policy layer
    that can block or require approval based on tool + args + context" and "assume
    every tool output is untrusted input."

    Currently, an agent can perform any registered operation regardless of the
    tool's declared policy. The approval workflow (Phase 5) exists but is only
    triggered manually via memory_request_approval — there is no automatic gating
    that says "this tool requires approval before execution."

    This phase adds: (1) a check_tool_policy() function that evaluates tool
    policies before execution, (2) automatic approval creation when a tool has
    approval_required=true, (3) rate limit enforcement using operation timestamps,
    (4) cost tier awareness in plan budget tracking, and (5) a policy violation
    trace span type for observability.

    Dependencies: Phase 4 (tool registry), Phase 5 (approval workflow), Phase 3
    (traces for violation recording). All are complete.
  questions:
  - Should policy checks apply to all tiers or only Tier 1/2 writes?
  - How should rate limits be counted — per session, per day, or sliding window?
  - Should policy violations be hard blocks or soft warnings with override capability?
  - How should policy checks interact with eval scenario execution?
