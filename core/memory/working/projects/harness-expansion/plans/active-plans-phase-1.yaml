id: active-plans-phase-1
project: harness-expansion
created: '2026-03-26'
origin_session: memory/activity/2026/03/26/chat-001
status: active
budget:
  deadline: '2026-04-15'
  max_sessions: 8
  advisory: true
purpose:
  summary: >-
    Extend the plan schema with sources, postconditions, approval gates,
    and budgets to make plans active execution surfaces.
  context: |
    Engram's plan system stores phases and tasks but provides no structured
    affordance for what to read before acting, what must be true after, when
    to pause for human input, or when to stop. The deep research report on
    agent harnesses (2026-03-26) identifies this as the critical gap between
    Engram's memory layer and a minimal agent harness.

    This plan implements four schema extensions (SourceSpec, postconditions,
    requires_approval, PlanBudget) and updates the MCP tool surface to return
    structured execution directives that include these new fields. The design
    document is at IN/phase-1-schema-design.md.

    Key constraint: all extensions must be backward-compatible. Existing plans
    must load without modification. New fields default to empty/false/null.
  questions:
    - Should internal source paths be validated for existence at plan-create time?
    - Should postconditions be free-text or typed with validator references?
    - How should requires_approval interact with the existing change-class system?
    - Should budget enforcement be implemented now or deferred to a later phase?
work:
  phases:
    # ── Core schema extensions (plan_utils.py) ──────────────────────────

    - id: source-spec-dataclass
      title: Add SourceSpec dataclass and sources field to PlanPhase
      status: pending
      commit: null
      blockers: []
      sources:
        - path: core/tools/agent_memory_mcp/plan_utils.py
          type: internal
          intent: >-
            Understand current PlanPhase dataclass, _coerce_phases(), to_dict(),
            and serialization patterns before adding a parallel field.
        - path: core/memory/working/projects/harness-expansion/IN/phase-1-schema-design.md
          type: internal
          intent: >-
            Reference the SourceSpec design (types, validation rules, behavioral
            contract) to ensure implementation matches specification.
        - path: core/memory/working/notes/harness-expansion-analysis.md
          type: internal
          intent: >-
            Ground the implementation in the gap analysis that motivated this
            work.
      postconditions:
        - SourceSpec dataclass exists with path, type, intent, uri fields
        - "SOURCE_TYPES = {'internal', 'external', 'mcp'} is defined"
        - PlanPhase has a sources field defaulting to empty list
        - "Round-trip: load_plan(save_plan(plan)) preserves sources"
        - Empty sources lists are omitted from YAML output
        - pre-commit hooks pass
      requires_approval: false
      changes:
        - path: core/tools/agent_memory_mcp/plan_utils.py
          action: update
          description: >-
            Add SOURCE_TYPES set, SourceSpec dataclass (path, type, intent,
            uri), _coerce_source_specs helper. Add sources field to PlanPhase
            with default empty list. Update PlanPhase.to_dict() and
            _coerce_phases() to round-trip sources through YAML. Update
            save_plan to omit empty sources lists for clean YAML output.

    - id: postconditions-and-approval
      title: Add postconditions list and requires_approval flag to PlanPhase
      status: pending
      commit: null
      blockers: []
      sources:
        - path: core/tools/agent_memory_mcp/plan_utils.py
          type: internal
          intent: >-
            Read the updated PlanPhase (now with sources) to understand the
            pattern for adding more optional fields with omit-defaults.
        - path: core/tools/agent_memory_mcp/plan_utils.py
          type: internal
          intent: >-
            Review phase_change_class() to understand how the existing
            approval model works, since requires_approval must compose with it.
      postconditions:
        - "PlanPhase has postconditions (list[str], default []) field"
        - "PlanPhase has requires_approval (bool, default False) field"
        - Postconditions validated as non-empty strings when present
        - Empty postconditions and false requires_approval omitted from YAML
        - pre-commit hooks pass
      requires_approval: false
      changes:
        - path: core/tools/agent_memory_mcp/plan_utils.py
          action: update
          description: >-
            Add postconditions (list[str], default []) and requires_approval
            (bool, default False) fields to PlanPhase. Update to_dict(),
            _coerce_phases(), and omit-defaults logic. Validate postconditions
            are non-empty strings when present.

    - id: plan-budget
      title: Add PlanBudget dataclass and budget field to PlanDocument
      status: pending
      commit: null
      blockers: []
      sources:
        - path: core/tools/agent_memory_mcp/plan_utils.py
          type: internal
          intent: >-
            Read PlanDocument dataclass to understand where budget fits in the
            top-level schema and how load_plan/save_plan handle optional
            top-level fields (cf. review field pattern).
        - path: core/memory/working/projects/harness-expansion/IN/phase-1-schema-design.md
          type: internal
          intent: >-
            Reference the PlanBudget design for field definitions, validation
            rules, and advisory vs enforced semantics.
      postconditions:
        - PlanBudget dataclass exists with deadline, max_sessions, advisory fields
        - PlanDocument has budget field defaulting to None
        - PlanDocument has sessions_used counter (int, default 0)
        - Deadline validated as YYYY-MM-DD format when present
        - max_sessions validated as >= 1 when present
        - "Round-trip: load_plan(save_plan(plan)) preserves budget"
        - Null budget omitted from YAML output
        - pre-commit hooks pass
      requires_approval: false
      changes:
        - path: core/tools/agent_memory_mcp/plan_utils.py
          action: update
          description: >-
            Add PlanBudget dataclass (deadline, max_sessions, advisory). Add
            budget field to PlanDocument (default None). Add sessions_used
            counter. Update to_dict(), load_plan(), save_plan() to round-trip
            budget. Validate deadline format and max_sessions >= 1.

    # ── Execution response enrichment ───────────────────────────────────

    - id: phase-payload-enrichment
      title: Enrich phase_payload and next_action to surface new fields
      status: pending
      commit: null
      blockers: []
      sources:
        - path: core/tools/agent_memory_mcp/plan_utils.py
          type: internal
          intent: >-
            Read phase_payload() and next_action() to understand the current
            response structure. The enrichment must be additive — existing
            response fields must not change shape.
        - path: core/tools/agent_memory_mcp/tools/semantic/plan_tools.py
          type: internal
          intent: >-
            Understand how plan_tools.py calls phase_payload() and
            next_action() so the enrichment propagates correctly through
            tool responses.
      postconditions:
        - phase_payload() includes sources, postconditions, requires_approval
        - >-
          next_action() returns a dict with id, title, sources,
          requires_approval (not just a string)
        - budget_status() helper returns days_remaining, sessions_used, over_budget
        - >-
          Existing callers of next_action() handle both string (old) and
          dict (new) return gracefully
        - pre-commit hooks pass
      requires_approval: true
      changes:
        - path: core/tools/agent_memory_mcp/plan_utils.py
          action: update
          description: >-
            Update phase_payload() to include sources, postconditions,
            requires_approval in the phase dict. Change next_action() to
            return a richer dict (id, title, sources, requires_approval)
            instead of a bare string. Add budget_status() helper. Ensure
            backward compatibility for next_action callers.

    # ── MCP tool surface updates ────────────────────────────────────────

    - id: tool-surface-create
      title: Update memory_plan_create to accept new fields
      status: pending
      commit: null
      blockers:
        - phase-payload-enrichment
      sources:
        - path: core/tools/agent_memory_mcp/tools/semantic/plan_tools.py
          type: internal
          intent: >-
            Read memory_plan_create to understand how phases are coerced and
            how preview/resulting_state is built, so new fields flow correctly.
        - path: core/tools/agent_memory_mcp/plan_utils.py
          type: internal
          intent: >-
            Verify coerce_phase_inputs now handles sources, postconditions,
            requires_approval after the earlier phases.
      postconditions:
        - memory_plan_create accepts budget parameter (optional dict)
        - Phase dicts with sources/postconditions/requires_approval are validated
        - Preview response includes budget info when budget is provided
        - resulting_state includes budget_status when budget is set
        - pre-commit hooks pass
      requires_approval: false
      changes:
        - path: core/tools/agent_memory_mcp/tools/semantic/plan_tools.py
          action: update
          description: >-
            Add budget parameter to memory_plan_create. Update
            coerce_phase_inputs call to pass through new phase fields. Update
            preview and resulting_state to include budget info.

    - id: tool-surface-execute
      title: Update memory_plan_execute to surface sources and enforce approval gates
      status: pending
      commit: null
      blockers:
        - tool-surface-create
      sources:
        - path: core/tools/agent_memory_mcp/tools/semantic/plan_tools.py
          type: internal
          intent: >-
            Read memory_plan_execute inspect/start/complete action flow to
            find injection points for sources, approval gates, and budget
            status.
        - path: core/tools/agent_memory_mcp/plan_utils.py
          type: internal
          intent: >-
            Verify budget_status() and enriched phase_payload() are available.
      postconditions:
        - >-
          inspect action includes sources, postconditions, requires_approval,
          budget_status
        - >-
          start action on requires_approval phase includes
          approval_gate: true in resulting_state
        - complete action increments sessions_used in budget
        - Budget warnings appear when approaching limits
        - "Advisory budget: warnings only. Enforced budget: error on overshoot."
        - pre-commit hooks pass
      requires_approval: false
      changes:
        - path: core/tools/agent_memory_mcp/tools/semantic/plan_tools.py
          action: update
          description: >-
            Update inspect to include new fields. Update start to surface
            approval gates. Update complete to increment sessions_used. Add
            budget warnings.

    # ── Quality and documentation ───────────────────────────────────────

    - id: test-coverage
      title: Add test coverage for all new schema fields and tool behaviors
      status: pending
      commit: null
      blockers:
        - tool-surface-execute
      sources:
        - path: HUMANS/tooling/tests
          type: internal
          intent: >-
            Survey existing test structure and conventions to match style.
        - path: core/tools/agent_memory_mcp/plan_utils.py
          type: internal
          intent: >-
            Read final state of all new dataclasses and helpers to ensure
            comprehensive coverage.
      postconditions:
        - SourceSpec validation tests cover all three types and error cases
        - Postconditions and requires_approval serialization tests pass
        - PlanBudget validation and budget_status() tests pass
        - "Backward compat: old plans without new fields load successfully"
        - "Round-trip: plan with all new fields survives save/load cycle"
        - "Tool tests: create/execute inspect/start/complete with new fields"
        - All pre-existing tests still pass
      requires_approval: false
      changes:
        - path: HUMANS/tooling/tests/test_plan_utils.py
          action: update
          description: >-
            Add unit tests for SourceSpec, postconditions, requires_approval,
            PlanBudget, budget_status, backward compat, round-trip.
        - path: HUMANS/tooling/tests/test_plan_tools.py
          action: update
          description: >-
            Add integration tests for create/execute with new fields, approval
            gates, and budget behavior.

    - id: documentation
      title: Update human-facing documentation for the new plan schema
      status: pending
      commit: null
      blockers:
        - test-coverage
      sources:
        - path: HUMANS/docs/DESIGN.md
          type: internal
          intent: >-
            Read existing 'Plans as durable work contexts' section to
            understand documentation scope and writing style.
        - path: HUMANS/docs/MCP.md
          type: internal
          intent: >-
            Read memory_plan_create and memory_plan_execute tool docs to
            understand the parameter documentation format.
        - path: core/memory/working/projects/harness-expansion/IN/phase-1-schema-design.md
          type: internal
          intent: >-
            Use design document as authoritative reference for behavioral
            contracts and migration notes.
      postconditions:
        - >-
          DESIGN.md 'Plans' section documents sources, postconditions,
          requires_approval, budget
        - DESIGN.md includes phase execution cycle diagram
        - MCP.md tool docs updated with new parameters and response fields
        - CHANGELOG.md has entry for plan schema extensions
      requires_approval: true
      changes:
