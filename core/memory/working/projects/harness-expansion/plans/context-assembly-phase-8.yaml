budget:
  deadline: '2026-06-15'
  max_sessions: 5
  advisory: true
purpose:
  summary: Add a context assembly tool that produces a single briefing packet for
    any plan phase, reducing agent overhead from 3-6 tool calls to one.
  context: >
    The deep research report emphasizes context engineering as a first-class
    concern: "Summarizing and compressing history while preserving decisions,
    constraints, unresolved issues, and other load-bearing facts."

    Currently, an agent beginning work on a phase must call memory_plan_execute
    inspect, manually read each source file, check next_action for failure
    history, query traces, and check approval status — 3-6 sequential tool
    calls before starting actual work. This phase adds assemble_briefing() and
    memory_plan_briefing to produce all that context in a single call with
    configurable budgeting.

    Design document: IN/phase-8-context-assembly-design.md

    Dependencies: Benefits from all prior phases (assembles their outputs) but
    has no hard blockers — each assembly component degrades gracefully if the
    underlying subsystem data is absent.
  questions:
  - Resolved in implementation: default max_context_chars remains 8000, with 0 meaning unlimited.
  - Resolved in implementation: source truncation uses a smart head/tail excerpt.
  - Resolved in implementation: briefing results are not cached yet; direct reads keep behavior simple and deterministic.
