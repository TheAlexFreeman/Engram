purpose:
  summary: Add external content ingestion affordances so agents can stage web-fetched
    or drop-zone content into project inboxes with auto-generated trust frontmatter
    and SHA-256 deduplication.
  context: >
    The system already has governance plumbing for external content: a
    `source: external-research` frontmatter type, `trust: low` initial
    assignment, `_unverified/` quarantine, and a promotion pipeline. What is
    missing is the tool surface. Agents must currently use raw Tier 2 write
    tools, hand-craft frontmatter, and manually enforce trust assignment.
    This bypasses governance, creates provenance drift, and makes ingestion
    behavior agent-specific rather than system-defined.

    This phase adds three affordances: (1) `memory_stage_external` — an
    MCP tool that accepts content from an agent and stages it in
    `projects/{project}/IN/` with auto-generated frontmatter and SHA-256
    deduplication; (2) `fetch_directives` / `mcp_calls` structured hints
    surfaced in `phase_payload()` for phases with `type: external` or
    `type: mcp` sources, providing agents actionable guidance on what to
    fetch before starting work; (3) `memory_scan_drop_zone` — a bulk
    ingestion tool that reads configured `watch_folders` from
    agent-bootstrap.toml, SHA-256 hashes file contents to prevent
    re-staging, and emits a structured scan report.

    Design document: IN/phase-9-external-ingestion-design.md

    Dependencies: Phase 1 SourceSpec provides the `type: external|mcp`
    vocabulary. Phase 5 HITL preview envelope pattern informs
    `memory_stage_external` return contract. Phases 6-8 are independent.
  questions:
  - "Resolved in implementation: SHA-256 deduplication is per-project via .staged-hashes.jsonl in each project root."
  - "Resolved in implementation: PDF extraction is soft optional; missing libraries produce per-file scan errors instead of failing the whole tool."
  - "Resolved in implementation: fetch_directives and mcp_calls are emitted only when the referenced staged file is absent."
  - "Resolved in implementation: memory_stage_external stages into projects/{project}/IN/ and leaves promotion to later review flows."
  - "Resolved in implementation: watch_folders supports path, target_project, source_label, extensions, and recursive; trust stays system-enforced at low."
