budget:
  deadline: '2026-07-01'
  max_sessions: 8
  advisory: true
purpose:
  summary: Add an offline evaluation framework that measures harness effectiveness
    using declarative scenarios and trace-derived metrics.
  context: >
    The deep research report identifies evaluation as the clearest remaining
    gap: "Eval value compounds over the lifecycle of an agent and prevents
    reactive production firefighting."

    Phase 3 added structured traces and a query tool, but there is no mechanism
    to define expected behavior, measure outcome metrics, detect regression, or
    compute process metrics from trace data.

    This phase adds: (1) a YAML-based eval scenario schema, (2) EvalScenario /
    EvalStep / EvalAssertion dataclasses, (3) an eval runner in eval_utils.py,
    (4) metrics computation (task_success, steps_to_success, retry_rate, etc.),
    (5) MCP tools (memory_run_eval, memory_eval_report), and (6) seed
    scenarios covering core harness workflows.

    Design document: IN/phase-7-eval-framework-design.md

    Dependencies: Phase 3 (trace infrastructure for metrics). Phase 6
    fixtures are helpful but not blocking.
  questions:
  - Should eval results persist as YAML files or append to a JSONL log?
  - What is the minimum set of seed scenarios to cover key harness workflows?
  - Should memory_run_eval support running individual scenarios or only full suites?
  - How should metric trends be stored and compared across runs?
