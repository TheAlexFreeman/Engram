purpose:
  summary: Add inline postcondition verification, failure recording, and retry-with-context
    to make plan execution self-correcting.
  context: |-
    Phase 1 added PostconditionSpec with typed validators (check, grep, test, manual)
    but no automated evaluation. Postconditions are surfaced in tool responses so the
    agent can self-check, but there's no tool to run the checks programmatically.

    The harness report's #1 reliability recommendation is "tool-grounded checkpoints":
    interleave reasoning with actions, verify before proceeding. This phase closes the
    loop by adding a verification tool, wiring it into the completion flow, and recording
    failures for informed retry.

    Design document: IN/phase-2-verification-design.md
  questions:
  - Should test-type postconditions use a command allowlist or a denylist?
  - Should verification failures block phase completion or just warn?
  - How many retry attempts should be recorded before suggesting plan revision?
  - Should the verify tool return partial results if one postcondition errors?
