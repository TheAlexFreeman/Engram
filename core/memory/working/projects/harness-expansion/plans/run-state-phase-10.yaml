sessions_used: 0
budget:
  deadline: '2026-05-15'
  max_sessions: 10
  advisory: true
purpose:
  summary: Introduce a formal run-state layer that separates plan execution state from
    plan definition, enabling checkpoint/resume across sessions without re-deriving
    progress.
  context: >
    The deep research report's strongest recommendation for long-horizon reliability
    is: "run state is for correctness and resumability; memory is for recall and
    personalization. Mixing them tends to cause state drift."

    Currently, plan execution state is distributed across plan YAML files (phase
    status fields), git commits, and operations.jsonl. When an agent resumes a
    multi-session plan, it must re-read the entire plan document and infer where
    it was — there is no explicit checkpoint with intermediate outputs, current
    task position, or budget consumption. This makes resumption fragile and
    context-expensive.

    This phase introduces a RunState JSON schema persisted per-plan alongside the
    plan YAML, auto-saved after each successful step via memory_plan_execute, and
    loadable via a new memory_plan_resume tool that assembles minimal restart
    context.

    The key architectural constraint: run state must not duplicate or contradict
    the plan YAML. Phase status remains authoritative in the plan file; run state
    adds execution-level detail (current task within a phase, intermediate outputs,
    last checkpoint timestamp, budget consumption, next action hint).

    Dependencies: Builds on Phase 1 (plan schema), Phase 2 (verification/failure),
    Phase 3 (traces), and Phase 8 (context assembly). No hard blockers.
  questions:
  - Should run state be committed to git on every update, or only at phase boundaries?
  - How should run state handle concurrent access (two sessions working the same plan)?
  - Should intermediate_outputs be stored inline or as file references?
  - What is the maximum reasonable run-state file size before it needs pruning?
