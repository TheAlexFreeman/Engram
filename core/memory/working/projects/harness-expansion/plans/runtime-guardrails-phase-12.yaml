purpose:
  summary: Add runtime guardrails beyond path validation — schema enforcement, content
    size limits, trust-boundary guards, and a centralized pre-write validation pipeline.
  context: >
    The deep research report calls for guardrails as a "parallel control plane" —
    cheap checks that run before expensive operations, validating inputs/outputs
    and routing based on policy. Currently, Engram's guardrails are limited to
    path_policy.py (directory-level write protection) and prose governance docs.

    Several validation capabilities exist in scattered form but aren't centralized
    or consistently enforced: frontmatter_utils.py can parse and validate YAML
    frontmatter but isn't called on every write path; trust assignment rules exist
    in governance docs but aren't enforced in code; there's no content size guard
    to prevent oversized files from bloating the git repo.

    This phase centralizes these into a GuardPipeline that runs on every write
    operation, with configurable guards that can block, warn, or require approval.
    The pipeline is designed to be extensible — new guards can be added without
    modifying the core write path.

    Dependencies: Phase 11 (policy enforcement provides the check/block pattern).
    path_policy.py (existing path guards become one stage in the pipeline).
  questions:
  - Should guards run synchronously in the write path or as a pre-commit hook?
  - What content size threshold is appropriate (files vs total repo)?
  - Should trust:high assignment require approval or just emit a warning?
  - How should guard failures interact with plan execution state?
